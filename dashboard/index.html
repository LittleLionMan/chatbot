<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>Bob Dashboard</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0e0e0f;
                --bg2: #161618;
                --bg3: #1e1e21;
                --bg4: #26262a;
                --border: rgba(255, 255, 255, 0.07);
                --border2: rgba(255, 255, 255, 0.13);
                --text: #e8e8e6;
                --text2: #888884;
                --text3: #555552;
                --accent: #1d9e75;
                --accent-dim: rgba(29, 158, 117, 0.15);
                --red: #e24b4a;
                --red-dim: rgba(226, 75, 74, 0.12);
                --amber: #ef9f27;
                --amber-dim: rgba(239, 159, 39, 0.12);
                --blue: #378add;
                --blue-dim: rgba(55, 138, 221, 0.12);
                --font: "Syne", sans-serif;
                --mono: "IBM Plex Mono", monospace;
                --radius: 10px;
                --radius-sm: 6px;
                --bottom-nav-height: 60px;
                --safe-bottom: env(safe-area-inset-bottom, 0px);
            }
            body {
                font-family: var(--font);
                background: var(--bg);
                color: var(--text);
                height: 100vh;
                height: 100dvh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 1.5rem;
                height: 52px;
                border-bottom: 0.5px solid var(--border);
                flex-shrink: 0;
            }
            .topbar-left {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .topbar-name {
                font-size: 15px;
                font-weight: 600;
                letter-spacing: -0.01em;
            }
            .topbar-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--accent);
                box-shadow: 0 0 6px var(--accent);
                flex-shrink: 0;
            }
            .topbar-back {
                display: none;
                background: none;
                border: none;
                color: var(--text2);
                cursor: pointer;
                font-size: 20px;
                padding: 4px;
                line-height: 1;
            }
            .topbar-back.visible {
                display: block;
            }
            .topbar-title {
                font-size: 14px;
                font-weight: 500;
                color: var(--text2);
            }

            .desktop-nav {
                display: flex;
                gap: 2px;
            }
            .nav-btn {
                font-family: var(--font);
                font-size: 13px;
                font-weight: 500;
                padding: 6px 14px;
                border-radius: var(--radius-sm);
                border: none;
                background: transparent;
                color: var(--text2);
                cursor: pointer;
                transition:
                    background 0.1s,
                    color 0.1s;
            }
            .nav-btn:hover {
                background: var(--bg3);
                color: var(--text);
            }
            .nav-btn.active {
                background: var(--bg3);
                color: var(--text);
            }

            .layout {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            .sidebar {
                width: 240px;
                flex-shrink: 0;
                border-right: 0.5px solid var(--border);
                overflow-y: auto;
                padding: 1rem;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .sidebar-search {
                font-family: var(--font);
                font-size: 13px;
                width: 100%;
                padding: 7px 10px;
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
                margin-bottom: 8px;
            }
            .sidebar-search:focus {
                outline: none;
                border-color: var(--border2);
            }
            .sidebar-item {
                padding: 9px 10px;
                border-radius: var(--radius-sm);
                cursor: pointer;
                border: 0.5px solid transparent;
                transition: background 0.1s;
            }
            .sidebar-item:hover {
                background: var(--bg3);
            }
            .sidebar-item.active {
                background: var(--bg3);
                border-color: var(--border);
            }
            .si-name {
                font-size: 13px;
                font-weight: 500;
                color: var(--text);
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .si-meta {
                font-size: 11px;
                color: var(--text3);
                margin-top: 2px;
                font-family: var(--mono);
            }

            .detail {
                flex: 1;
                overflow-y: auto;
                padding: 1.5rem;
            }
            .empty-state {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 200px;
                font-size: 13px;
                color: var(--text3);
            }

            .section {
                display: none;
            }
            .section.active {
                display: flex;
                height: 100%;
                overflow: hidden;
            }

            .badge {
                font-size: 10px;
                font-family: var(--mono);
                padding: 2px 7px;
                border-radius: 99px;
                font-weight: 500;
            }
            .badge-active {
                background: var(--accent-dim);
                color: var(--accent);
            }
            .badge-inactive {
                background: var(--bg4);
                color: var(--text3);
            }
            .badge-pending {
                background: var(--amber-dim);
                color: var(--amber);
            }
            .badge-done {
                background: var(--bg4);
                color: var(--text3);
            }
            .badge-user {
                background: var(--blue-dim);
                color: var(--blue);
            }
            .badge-reflection {
                background: var(--amber-dim);
                color: var(--amber);
            }
            .badge-group {
                background: var(--bg4);
                color: var(--text3);
            }
            .badge-bot {
                background: var(--accent-dim);
                color: var(--accent);
            }

            .detail-block {
                margin-bottom: 1.5rem;
            }
            .detail-block-title {
                font-size: 10px;
                font-family: var(--mono);
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .detail-text {
                font-size: 13px;
                color: var(--text);
                line-height: 1.6;
            }
            .detail-mono {
                font-family: var(--mono);
                font-size: 12px;
                color: var(--text2);
                margin-bottom: 2px;
            }
            .action-bar {
                display: flex;
                gap: 8px;
                margin-bottom: 1.25rem;
                flex-wrap: wrap;
            }
            .btn {
                font-family: var(--font);
                font-size: 12px;
                font-weight: 500;
                padding: 5px 12px;
                border-radius: var(--radius-sm);
                border: 0.5px solid var(--border2);
                background: transparent;
                color: var(--text2);
                cursor: pointer;
                transition:
                    background 0.1s,
                    color 0.1s;
            }
            .btn:hover {
                background: var(--bg3);
                color: var(--text);
            }
            .btn-danger {
                border-color: var(--red);
                color: var(--red);
            }
            .btn-danger:hover {
                background: var(--red-dim);
            }
            .btn-accent {
                border-color: var(--accent);
                color: var(--accent);
            }
            .btn-accent:hover {
                background: var(--accent-dim);
            }
            .btn-sm {
                font-size: 11px;
                padding: 3px 8px;
            }

            .agent-tabs {
                display: flex;
                gap: 2px;
                border-bottom: 0.5px solid var(--border);
                margin-bottom: 1.25rem;
            }
            .agent-tab {
                font-family: var(--font);
                font-size: 12px;
                font-weight: 500;
                padding: 6px 14px;
                border: none;
                background: transparent;
                color: var(--text3);
                cursor: pointer;
                border-bottom: 2px solid transparent;
                margin-bottom: -0.5px;
                transition: color 0.1s;
            }
            .agent-tab:hover {
                color: var(--text2);
            }
            .agent-tab.active {
                color: var(--text);
                border-bottom-color: var(--accent);
            }
            .agent-tab-count {
                font-size: 10px;
                font-family: var(--mono);
                background: var(--bg4);
                border-radius: 99px;
                padding: 1px 5px;
                margin-left: 4px;
            }
            .tab-panel {
                display: none;
            }
            .tab-panel.active {
                display: block;
            }

            .state-grid {
                display: grid;
                gap: 6px;
            }
            .state-card {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 10px 12px;
            }
            .state-card-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 4px;
            }
            .state-key {
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text3);
            }
            .state-val {
                font-size: 12px;
                color: var(--text2);
                line-height: 1.5;
                word-break: break-word;
                white-space: pre-wrap;
            }
            .state-actions {
                display: flex;
                gap: 4px;
                opacity: 0;
                transition: opacity 0.1s;
            }
            .state-card:hover .state-actions {
                opacity: 1;
            }

            .ns-block {
                margin-bottom: 1.25rem;
            }
            .ns-label {
                font-size: 10px;
                font-family: var(--mono);
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                margin-bottom: 6px;
                padding-bottom: 4px;
                border-bottom: 0.5px solid var(--border);
            }
            .data-card {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 10px 12px;
                margin-bottom: 6px;
            }
            .data-card-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 4px;
            }
            .data-key {
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text3);
            }
            .data-val {
                font-size: 12px;
                color: var(--text2);
                line-height: 1.5;
                word-break: break-word;
                white-space: pre-wrap;
                max-height: 140px;
                overflow-y: auto;
            }
            .data-actions {
                display: flex;
                gap: 4px;
                opacity: 0;
                transition: opacity 0.1s;
            }
            .data-card:hover .data-actions {
                opacity: 1;
            }

            .mem-list {
                display: flex;
                flex-direction: column;
            }
            .mem-row {
                display: flex;
                align-items: flex-start;
                gap: 10px;
                padding: 8px 0;
                border-bottom: 0.5px solid var(--border);
            }
            .mem-row:last-child {
                border-bottom: none;
            }
            .mem-text {
                font-size: 13px;
                color: var(--text);
                line-height: 1.5;
                flex: 1;
            }
            .mem-date {
                font-size: 10px;
                font-family: var(--mono);
                color: var(--text3);
                flex-shrink: 0;
                padding-top: 2px;
            }
            .mem-actions {
                display: flex;
                gap: 4px;
                opacity: 0;
                transition: opacity 0.1s;
                flex-shrink: 0;
            }
            .mem-row:hover .mem-actions {
                opacity: 1;
            }

            .metrics-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin-bottom: 1.5rem;
            }
            .metric-card {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius);
                padding: 1rem 1.25rem;
            }
            .metric-label {
                font-size: 11px;
                color: var(--text3);
                font-family: var(--mono);
                margin-bottom: 6px;
            }
            .metric-value {
                font-size: 24px;
                font-weight: 600;
                color: var(--text);
                letter-spacing: -0.02em;
            }
            .caller-list {
                display: flex;
                flex-direction: column;
            }
            .caller-row {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 7px 0;
                border-bottom: 0.5px solid var(--border);
            }
            .caller-row:last-child {
                border-bottom: none;
            }
            .caller-name {
                font-family: var(--mono);
                font-size: 11px;
                color: var(--text2);
                width: 180px;
                flex-shrink: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .caller-bar-bg {
                flex: 1;
                background: var(--bg3);
                border-radius: 2px;
                height: 3px;
            }
            .caller-bar-fg {
                height: 3px;
                border-radius: 2px;
                background: var(--accent);
            }
            .caller-tokens {
                font-family: var(--mono);
                font-size: 11px;
                color: var(--text3);
                width: 80px;
                text-align: right;
            }
            .trigger-item {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 10px 14px;
                margin-bottom: 8px;
            }
            .trigger-header {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 4px;
            }
            .trigger-name {
                font-size: 13px;
                font-weight: 500;
            }
            .trigger-meta {
                font-size: 11px;
                font-family: var(--mono);
                color: var(--text3);
            }

            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                z-index: 100;
                align-items: flex-end;
                justify-content: center;
            }
            .modal-overlay.open {
                display: flex;
            }
            .modal {
                background: var(--bg2);
                border: 0.5px solid var(--border2);
                border-radius: var(--radius) var(--radius) 0 0;
                padding: 1.5rem;
                width: 100%;
                max-height: 85vh;
                overflow-y: auto;
            }
            .modal-title {
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 1rem;
            }
            .modal-field {
                margin-bottom: 12px;
            }
            .modal-label {
                font-size: 11px;
                font-family: var(--mono);
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 0.06em;
                margin-bottom: 4px;
            }
            .modal-input {
                font-family: var(--font);
                font-size: 13px;
                width: 100%;
                padding: 10px;
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
            }
            .modal-input:focus {
                outline: none;
                border-color: var(--border2);
            }
            textarea.modal-input {
                resize: vertical;
                min-height: 80px;
                font-family: var(--mono);
                font-size: 12px;
                line-height: 1.5;
            }
            .modal-select {
                font-family: var(--font);
                font-size: 13px;
                width: 100%;
                padding: 10px;
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
            }
            .modal-actions {
                display: flex;
                gap: 8px;
                justify-content: flex-end;
                margin-top: 1rem;
            }

            .toast {
                position: fixed;
                bottom: calc(
                    var(--bottom-nav-height) + var(--safe-bottom) + 1rem
                );
                right: 1rem;
                left: 1rem;
                background: var(--bg3);
                border: 0.5px solid var(--border2);
                border-radius: var(--radius-sm);
                padding: 10px 16px;
                font-size: 13px;
                color: var(--text);
                z-index: 200;
                opacity: 0;
                transform: translateY(8px);
                transition:
                    opacity 0.2s,
                    transform 0.2s;
                pointer-events: none;
                text-align: center;
            }
            .toast.show {
                opacity: 1;
                transform: translateY(0);
            }
            .toast.error {
                border-color: var(--red);
                color: var(--red);
            }

            .bottom-nav {
                display: none;
            }
            .sub-tabs {
                display: flex;
                gap: 6px;
                margin-bottom: 12px;
            }
            .divider {
                border: none;
                border-top: 0.5px solid var(--border);
                margin: 1.25rem 0;
            }

            @media (min-width: 769px) {
                .modal-overlay {
                    align-items: center;
                }
                .modal {
                    border-radius: var(--radius);
                    width: 520px;
                }
                .toast {
                    left: auto;
                    right: 1.5rem;
                    bottom: 1.5rem;
                    text-align: left;
                }
                .state-actions {
                    opacity: 0;
                }
                .data-actions {
                    opacity: 0;
                }
                .mem-actions {
                    opacity: 0;
                }
            }

            @media (max-width: 768px) {
                .desktop-nav {
                    display: none;
                }
                .topbar {
                    padding: 0 1rem;
                }

                .layout {
                    flex-direction: column;
                    position: relative;
                }

                .section {
                    flex-direction: column;
                }
                .section.active {
                    display: flex;
                }

                .sidebar {
                    width: 100%;
                    border-right: none;
                    border-bottom: none;
                    overflow-y: auto;
                    flex: 1;
                    transition:
                        transform 0.25s ease,
                        opacity 0.25s ease;
                }
                .sidebar.hidden {
                    display: none;
                }

                .detail {
                    position: absolute;
                    inset: 0;
                    background: var(--bg);
                    transform: translateX(100%);
                    transition: transform 0.25s ease;
                    padding: 1rem;
                    overflow-y: auto;
                    pointer-events: none;
                }
                .detail.visible {
                    transform: translateX(0);
                    pointer-events: all;
                }

                .section.active .sidebar {
                    display: flex;
                }

                .bottom-nav {
                    display: flex;
                    background: var(--bg2);
                    border-top: 0.5px solid var(--border);
                    height: calc(var(--bottom-nav-height) + var(--safe-bottom));
                    padding-bottom: var(--safe-bottom);
                    flex-shrink: 0;
                    z-index: 50;
                }
                .bottom-nav-item {
                    flex: 1;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    gap: 3px;
                    background: none;
                    border: none;
                    color: var(--text3);
                    cursor: pointer;
                    padding: 8px 4px;
                    transition: color 0.1s;
                    font-family: var(--font);
                }
                .bottom-nav-item.active {
                    color: var(--accent);
                }
                .bottom-nav-item svg {
                    width: 22px;
                    height: 22px;
                    stroke: currentColor;
                    fill: none;
                    stroke-width: 1.5;
                    stroke-linecap: round;
                    stroke-linejoin: round;
                }
                .bottom-nav-label {
                    font-size: 10px;
                    font-weight: 500;
                }

                .sidebar-item {
                    padding: 12px 10px;
                }
                .si-name {
                    font-size: 14px;
                }
                .state-actions {
                    opacity: 1;
                }
                .data-actions {
                    opacity: 1;
                }
                .mem-actions {
                    opacity: 1;
                }

                .metrics-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
                .caller-name {
                    width: 120px;
                }

                .agent-tab {
                    font-size: 11px;
                    padding: 6px 10px;
                }
            }
        </style>
    </head>
    <body>
        <div class="topbar">
            <div class="topbar-left">
                <button class="topbar-back" id="topbar-back" onclick="goBack()">
                    ←
                </button>
                <div class="topbar-dot" id="topbar-dot"></div>
                <div class="topbar-name" id="topbar-name">Bob Dashboard</div>
            </div>
            <nav class="desktop-nav">
                <button class="nav-btn active" data-section="agents">
                    Agenten
                </button>
                <button class="nav-btn" data-section="memory">Memory</button>
                <button class="nav-btn" data-section="usage">Usage</button>
                <button class="nav-btn" data-section="triggers">
                    Triggers
                </button>
            </nav>
            <div style="width: 40px"></div>
        </div>

        <div class="layout">
            <div class="section active" id="section-agents">
                <div class="sidebar" id="agents-sidebar">
                    <input
                        class="sidebar-search"
                        id="agents-search"
                        placeholder="Suchen…"
                    />
                    <div id="agents-list">
                        <div
                            style="
                                font-size: 13px;
                                color: var(--text3);
                                padding: 8px;
                            "
                        >
                            Lade…
                        </div>
                    </div>
                </div>
                <div class="detail" id="agents-detail">
                    <div class="empty-state">← Agent auswählen</div>
                </div>
            </div>

            <div class="section" id="section-memory">
                <div class="sidebar" id="memory-sidebar">
                    <div class="sub-tabs">
                        <button
                            class="nav-btn active"
                            id="mem-users-btn"
                            onclick="switchMemMode('users')"
                        >
                            Nutzer
                        </button>
                        <button
                            class="nav-btn"
                            id="mem-groups-btn"
                            onclick="switchMemMode('groups')"
                        >
                            Gruppen
                        </button>
                    </div>
                    <input
                        class="sidebar-search"
                        id="memory-search"
                        placeholder="Suchen…"
                    />
                    <div id="memory-list">
                        <div
                            style="
                                font-size: 13px;
                                color: var(--text3);
                                padding: 8px;
                            "
                        >
                            Lade…
                        </div>
                    </div>
                </div>
                <div class="detail" id="memory-detail">
                    <div class="empty-state">← Eintrag auswählen</div>
                </div>
            </div>

            <div class="section" id="section-usage">
                <div
                    class="detail visible"
                    id="usage-detail"
                    style="
                        position: relative;
                        transform: none;
                        pointer-events: all;
                        width: 100%;
                    "
                >
                    <div class="agent-tabs" id="usage-tabs">
                        <button class="agent-tab active" data-tab="caller">
                            Caller
                        </button>
                        <button class="agent-tab" data-tab="history">
                            History
                        </button>
                    </div>
                    <div class="tab-panel active" id="usage-tab-caller">
                        <div class="empty-state">Lade…</div>
                    </div>
                    <div class="tab-panel" id="usage-tab-history">
                        <div class="empty-state">Lade…</div>
                    </div>
                </div>
            </div>

            <div class="section" id="section-triggers">
                <div
                    class="detail visible"
                    id="triggers-detail"
                    style="
                        position: relative;
                        transform: none;
                        pointer-events: all;
                        width: 100%;
                    "
                >
                    <div class="empty-state">Lade…</div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <button class="bottom-nav-item active" data-section="agents">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="4" />
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                </svg>
                <span class="bottom-nav-label">Agenten</span>
            </button>
            <button class="bottom-nav-item" data-section="memory">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"
                    />
                    <circle cx="12" cy="9" r="2.5" />
                </svg>
                <span class="bottom-nav-label">Memory</span>
            </button>
            <button class="bottom-nav-item" data-section="usage">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="12" width="4" height="9" rx="1" />
                    <rect x="10" y="7" width="4" height="14" rx="1" />
                    <rect x="17" y="3" width="4" height="18" rx="1" />
                </svg>
                <span class="bottom-nav-label">Usage</span>
            </button>
            <button class="bottom-nav-item" data-section="triggers">
                <svg viewBox="0 0 24 24">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                </svg>
                <span class="bottom-nav-label">Triggers</span>
            </button>
        </nav>

        <div
            class="modal-overlay"
            id="modal-overlay"
            onclick="closeModal(event)"
        >
            <div class="modal">
                <div class="modal-title" id="modal-title"></div>
                <div id="modal-body"></div>
                <div class="modal-actions" id="modal-actions"></div>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script>
            const BASE = "__API_URL__";
            let memMode = "users";
            let memData = { users: [], groups: [] };
            let agentsData = [];
            let currentAgentId = null;
            let currentMemSubjectId = null;
            let _agentMemCache = {};
            let _agentDataCache = {};
            let _memCache = {};
            let _isMobile = () => window.innerWidth <= 768;

            function api(path, opts) {
                return fetch(BASE + path, opts).then((r) => {
                    if (!r.ok) throw new Error(r.status);
                    return r.json();
                });
            }

            function fmt(iso) {
                if (!iso) return "—";
                const d = new Date(iso);
                return (
                    d.toLocaleDateString("de-DE", {
                        day: "2-digit",
                        month: "2-digit",
                        year: "2-digit",
                    }) +
                    " " +
                    d.toLocaleTimeString("de-DE", {
                        hour: "2-digit",
                        minute: "2-digit",
                    })
                );
            }

            function fmtNum(n) {
                return Number(n).toLocaleString("de-DE");
            }

            function toast(msg, isError) {
                const el = document.getElementById("toast");
                el.textContent = msg;
                el.className = "toast show" + (isError ? " error" : "");
                setTimeout(() => (el.className = "toast"), 2500);
            }

            function openModal(title, bodyHtml, actions) {
                document.getElementById("modal-title").textContent = title;
                document.getElementById("modal-body").innerHTML = bodyHtml;
                document.getElementById("modal-actions").innerHTML = actions;
                document.getElementById("modal-overlay").classList.add("open");
            }

            function closeModal(e) {
                if (
                    !e ||
                    e.target === document.getElementById("modal-overlay")
                ) {
                    document
                        .getElementById("modal-overlay")
                        .classList.remove("open");
                }
            }

            function showDetail(detailEl, sidebarEl, title) {
                if (_isMobile()) {
                    sidebarEl.classList.add("hidden");
                    detailEl.classList.add("visible");
                    document
                        .getElementById("topbar-back")
                        .classList.add("visible");
                    document.getElementById("topbar-dot").style.display =
                        "none";
                    document.getElementById("topbar-name").textContent = title;
                }
            }

            function goBack() {
                const activeSection = document.querySelector(".section.active");
                if (!activeSection) return;
                const sidebar = activeSection.querySelector(".sidebar");
                const detail = activeSection.querySelector(".detail");
                if (sidebar) sidebar.classList.remove("hidden");
                if (detail) detail.classList.remove("visible");
                document
                    .getElementById("topbar-back")
                    .classList.remove("visible");
                document.getElementById("topbar-dot").style.display = "";
                document.getElementById("topbar-name").textContent =
                    "Bob Dashboard";
            }

            function switchSection(name) {
                document
                    .querySelectorAll(".section")
                    .forEach((s) => s.classList.remove("active"));
                document
                    .getElementById("section-" + name)
                    .classList.add("active");
                document
                    .querySelectorAll(".nav-btn[data-section]")
                    .forEach((b) =>
                        b.classList.toggle(
                            "active",
                            b.dataset.section === name,
                        ),
                    );
                document
                    .querySelectorAll(".bottom-nav-item")
                    .forEach((b) =>
                        b.classList.toggle(
                            "active",
                            b.dataset.section === name,
                        ),
                    );
                goBack();
            }

            document
                .querySelectorAll(".nav-btn[data-section]")
                .forEach((btn) => {
                    btn.addEventListener("click", function () {
                        switchSection(this.dataset.section);
                    });
                });

            document.querySelectorAll(".bottom-nav-item").forEach((btn) => {
                btn.addEventListener("click", function () {
                    switchSection(this.dataset.section);
                });
            });

            document
                .getElementById("agents-search")
                .addEventListener("input", function () {
                    renderAgentsList(this.value);
                });
            document
                .getElementById("memory-search")
                .addEventListener("input", function () {
                    renderMemoryList(this.value);
                });

            async function loadAgents() {
                try {
                    agentsData = await api("/api/agents");
                    renderAgentsList();
                } catch (e) {
                    document.getElementById("agents-list").innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:8px;">Backend nicht erreichbar.</div>';
                }
            }

            function renderAgentsList(filter) {
                const q = (filter || "").toLowerCase();
                const filtered = q
                    ? agentsData.filter(
                          (a) =>
                              a.name.toLowerCase().includes(q) ||
                              (a.type || "").includes(q),
                      )
                    : agentsData;
                if (!filtered.length) {
                    document.getElementById("agents-list").innerHTML =
                        '<div style="font-size:13px;color:var(--text3);padding:8px;">Keine Agenten.</div>';
                    return;
                }
                document.getElementById("agents-list").innerHTML = filtered
                    .map(
                        (a) => `
    <div class="sidebar-item" data-id="${a.id}" onclick="selectAgent(${a.id})">
      <div class="si-name">${a.name}<span class="badge ${a.is_active ? "badge-active" : "badge-inactive"}">${a.is_active ? "aktiv" : "inaktiv"}</span></div>
      <div class="si-meta">${a.type || "—"} · ${a.schedule}</div>
    </div>
  `,
                    )
                    .join("");
            }

            async function selectAgent(id) {
                currentAgentId = id;
                document
                    .querySelectorAll("#agents-list .sidebar-item")
                    .forEach((el) =>
                        el.classList.toggle(
                            "active",
                            Number(el.dataset.id) === id,
                        ),
                    );
                const a = agentsData.find((x) => x.id === id);
                const detail = document.getElementById("agents-detail");
                detail.innerHTML = '<div class="empty-state">Lade…</div>';
                showDetail(
                    detail,
                    document.getElementById("agents-sidebar"),
                    a.name,
                );

                try {
                    const [state, data, memories] = await Promise.all([
                        api("/api/agents/" + id + "/state"),
                        api("/api/agents/" + id + "/data"),
                        api("/api/agents/" + id + "/memories"),
                    ]);
                    _agentMemCache[id] = memories;
                    _agentDataCache[id] = data;

                    const nsMap = {};
                    data.forEach((d, i) => {
                        if (!nsMap[d.namespace]) nsMap[d.namespace] = [];
                        nsMap[d.namespace].push({ ...d, _idx: i });
                    });

                    detail.innerHTML = `
      <div class="action-bar">
        <button class="btn btn-accent" onclick="triggerAgent(${id})">Jetzt ausführen</button>
        <button class="btn" onclick="editAgent(${id})">Bearbeiten</button>
        ${a.is_active ? `<button class="btn btn-danger" onclick="stopAgent(${id})">Stoppen</button>` : ""}
      </div>
      <div class="detail-block">
        <div class="detail-block-title">Anweisung</div>
        <div class="detail-text">${a.instruction || "—"}</div>
      </div>
      <div class="detail-block">
        <div class="detail-block-title">Meta</div>
        <div class="detail-mono">Zeitplan: ${a.schedule}</div>
        <div class="detail-mono">Letzter Lauf: ${fmt(a.last_run_at)}</div>
        <div class="detail-mono">Nächster Lauf: ${fmt(a.next_run_at)}</div>
        <div class="detail-mono">Typ: ${a.type || "—"}</div>
        ${a.data_reads && a.data_reads.length ? `<div class="detail-mono" style="margin-top:4px;">data_reads: ${JSON.stringify(a.data_reads)}</div>` : ""}
      </div>
      <hr class="divider">
      <div class="agent-tabs">
        <button class="agent-tab active" data-tab="state">State <span class="agent-tab-count">${state.length}</span></button>
        <button class="agent-tab" data-tab="data">Data <span class="agent-tab-count">${data.length}</span></button>
        <button class="agent-tab" data-tab="memory">Memory <span class="agent-tab-count">${memories.length}</span></button>
      </div>
      <div class="tab-panel active" id="tab-state-${id}">
        <div class="state-grid">
          ${state
              .map(
                  (s) => `
            <div class="state-card">
              <div class="state-card-header">
                <div class="state-key">${s.key}</div>
                <div class="state-actions">
                  <button class="btn btn-sm" data-agent="${id}" data-key="${s.key}" data-action="edit-state">Bearbeiten</button>
                  <button class="btn btn-sm btn-danger" data-agent="${id}" data-key="${s.key}" data-action="delete-state">Löschen</button>
                </div>
              </div>
              <div class="state-val">${s.value}</div>
            </div>
          `,
              )
              .join("")}
          ${!state.length ? '<div style="font-size:13px;color:var(--text3);padding:8px 0;">Kein State.</div>' : ""}
        </div>
      </div>
      <div class="tab-panel" id="tab-data-${id}">
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
          <button class="btn btn-sm btn-accent" onclick="addAgentData(${id})">+ Neu</button>
        </div>
        ${
            Object.keys(nsMap).length
                ? Object.entries(nsMap)
                      .map(
                          ([ns, entries]) => `
          <div class="ns-block">
            <div class="ns-label">${ns}</div>
            ${entries
                .map(
                    (d) => `
              <div class="data-card">
                <div class="data-card-header">
                  <div class="data-key">${d.key} <span style="color:var(--text3);margin-left:6px;">${fmt(d.updated_at)}</span></div>
                  <div class="data-actions">
                    <button class="btn btn-sm" data-agent="${id}" data-idx="${d._idx}" data-action="edit-data">Bearbeiten</button>
                    <button class="btn btn-sm btn-danger" data-agent="${id}" data-idx="${d._idx}" data-action="delete-data">Löschen</button>
                  </div>
                </div>
                <div class="data-val">${d.value}</div>
              </div>
            `,
                )
                .join("")}
          </div>
        `,
                      )
                      .join("")
                : '<div style="font-size:13px;color:var(--text3);padding:8px 0;">Keine Data-Einträge.</div>'
        }
      </div>
      <div class="tab-panel" id="tab-memory-${id}">
        <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
          <button class="btn btn-sm btn-accent" onclick="addAgentMemory(${id})">+ Neu</button>
        </div>
        <div class="mem-list">
          ${memories
              .map(
                  (m, i) => `
            <div class="mem-row">
              <div class="mem-text">${m.content}</div>
              <div class="mem-date">${fmt(m.created_at)}</div>
              <div class="mem-actions">
                <button class="btn btn-sm" data-agent="${id}" data-idx="${i}" data-action="edit-agent-mem">Edit</button>
                <button class="btn btn-sm btn-danger" data-agent="${id}" data-idx="${i}" data-action="delete-agent-mem">Del</button>
              </div>
            </div>
          `,
              )
              .join("")}
          ${!memories.length ? '<div style="font-size:13px;color:var(--text3);padding:8px 0;">Keine Memories.</div>' : ""}
        </div>
      </div>
    `;

                    detail.querySelectorAll(".agent-tab").forEach((tab) => {
                        tab.addEventListener("click", function () {
                            detail
                                .querySelectorAll(".agent-tab")
                                .forEach((t) => t.classList.remove("active"));
                            detail
                                .querySelectorAll(".tab-panel")
                                .forEach((p) => p.classList.remove("active"));
                            this.classList.add("active");
                            detail
                                .querySelector(
                                    "#tab-" + this.dataset.tab + "-" + id,
                                )
                                .classList.add("active");
                        });
                    });

                    detail.removeEventListener("click", handleAgentDetailClick);
                    detail.addEventListener("click", handleAgentDetailClick);
                } catch (e) {
                    detail.innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:1rem;">Fehler beim Laden.</div>';
                }
            }

            let _confirmCallback = null;

            function confirmModal(message, onConfirm) {
                _confirmCallback = onConfirm;
                openModal(
                    "Bestätigen",
                    `<div style="font-size:13px;color:var(--text);line-height:1.6;">${message}</div>`,
                    `
    <button class="btn" onclick="closeModal()">Abbrechen</button>
    <button class="btn btn-danger" onclick="closeModal();_confirmCallback()">Löschen</button>
  `,
                );
            }

            function handleAgentDetailClick(e) {
                const btn = e.target.closest("[data-action]");
                if (!btn) return;
                const action = btn.dataset.action;
                const agentId = Number(btn.dataset.agent);

                if (action === "edit-state") {
                    const key = btn.dataset.key;
                    const currentVal = btn
                        .closest(".state-card")
                        .querySelector(".state-val").textContent;
                    openModal(
                        "State bearbeiten",
                        `
      <div class="modal-field"><div class="modal-label">Key</div><input class="modal-input" value="${key}" disabled /></div>
      <div class="modal-field"><div class="modal-label">Value</div><textarea class="modal-input" id="edit-state-val" style="min-height:140px;">${currentVal}</textarea></div>
    `,
                        `
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-accent" onclick="saveStateEntry(${agentId}, '${key}')">Speichern</button>
    `,
                    );
                } else if (action === "delete-state") {
                    const key = btn.dataset.key;
                    confirmModal(
                        'State-Eintrag "' + key + '" wirklich löschen?',
                        () => {
                            api(
                                "/api/agents/" +
                                    agentId +
                                    "/state/" +
                                    encodeURIComponent(key),
                                { method: "DELETE" },
                            )
                                .then(() => {
                                    toast("Gelöscht.");
                                    selectAgent(agentId);
                                })
                                .catch(() => toast("Fehler.", true));
                        },
                    );
                } else if (action === "edit-data") {
                    const idx = Number(btn.dataset.idx);
                    const d = _agentDataCache[agentId][idx];
                    openModal(
                        "Data bearbeiten",
                        `
      <div class="modal-field"><div class="modal-label">Namespace</div><input class="modal-input" value="${d.namespace}" disabled /></div>
      <div class="modal-field"><div class="modal-label">Key</div><input class="modal-input" value="${d.key}" disabled /></div>
      <div class="modal-field"><div class="modal-label">Value</div><textarea class="modal-input" id="edit-data-val" style="min-height:200px;">${d.value}</textarea></div>
    `,
                        `
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-accent" onclick="saveAgentData(${agentId}, ${idx})">Speichern</button>
    `,
                    );
                } else if (action === "delete-data") {
                    const idx = Number(btn.dataset.idx);
                    const d = _agentDataCache[agentId][idx];
                    confirmModal(
                        'Eintrag "' + d.namespace + "/" + d.key + '" löschen?',
                        () => {
                            api(
                                "/api/agents/" +
                                    agentId +
                                    "/data/" +
                                    encodeURIComponent(d.namespace) +
                                    "/" +
                                    encodeURIComponent(d.key),
                                { method: "DELETE" },
                            )
                                .then(() => {
                                    toast("Gelöscht.");
                                    selectAgent(agentId);
                                })
                                .catch(() => toast("Fehler.", true));
                        },
                    );
                } else if (action === "edit-agent-mem") {
                    const idx = Number(btn.dataset.idx);
                    const mem = _agentMemCache[agentId][idx];
                    openModal(
                        "Memory bearbeiten",
                        `
      <div class="modal-field"><div class="modal-label">Inhalt</div><textarea class="modal-input" id="edit-mem-content" style="min-height:100px;">${mem.content}</textarea></div>
    `,
                        `
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-accent" onclick="saveAgentMemory(${agentId}, ${idx})">Speichern</button>
    `,
                    );
                } else if (action === "delete-agent-mem") {
                    const idx = Number(btn.dataset.idx);
                    const mem = _agentMemCache[agentId][idx];
                    confirmModal("Memory löschen?", () => {
                        api("/api/agents/" + agentId + "/memories", {
                            method: "DELETE",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                content: mem.content,
                                subject_type: "agent",
                            }),
                        })
                            .then(() => {
                                toast("Gelöscht.");
                                selectAgent(agentId);
                            })
                            .catch(() => toast("Fehler.", true));
                    });
                }
            }

            async function saveStateEntry(agentId, key) {
                const value = document.getElementById("edit-state-val").value;
                try {
                    await api(
                        "/api/agents/" +
                            agentId +
                            "/state/" +
                            encodeURIComponent(key),
                        {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ value }),
                        },
                    );
                    closeModal();
                    toast("Gespeichert.");
                    selectAgent(agentId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            async function saveAgentData(agentId, idx) {
                const d = _agentDataCache[agentId][idx];
                const value = document.getElementById("edit-data-val").value;
                try {
                    await api(
                        "/api/agents/" +
                            agentId +
                            "/data/" +
                            encodeURIComponent(d.namespace) +
                            "/" +
                            encodeURIComponent(d.key),
                        {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ value }),
                        },
                    );
                    closeModal();
                    toast("Gespeichert.");
                    selectAgent(agentId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            function addAgentData(agentId) {
                const existing = _agentDataCache[agentId] || [];
                const namespaces = [
                    ...new Set(existing.map((d) => d.namespace)),
                ];
                openModal(
                    "Data-Eintrag hinzufügen",
                    `
    <div class="modal-field">
      <div class="modal-label">Namespace</div>
      <input class="modal-input" id="new-data-ns" list="ns-suggestions" placeholder="z.B. analyses" />
      <datalist id="ns-suggestions">${namespaces.map((ns) => `<option value="${ns}">`).join("")}</datalist>
    </div>
    <div class="modal-field"><div class="modal-label">Key</div><input class="modal-input" id="new-data-key" placeholder="z.B. EOSE" /></div>
    <div class="modal-field"><div class="modal-label">Value</div><textarea class="modal-input" id="new-data-val" style="min-height:120px;" placeholder="Inhalt…"></textarea></div>
  `,
                    `
    <button class="btn" onclick="closeModal()">Abbrechen</button>
    <button class="btn btn-accent" onclick="saveNewAgentData(${agentId})">Speichern</button>
  `,
                );
            }

            async function saveNewAgentData(agentId) {
                const namespace = document
                    .getElementById("new-data-ns")
                    .value.trim();
                const key = document
                    .getElementById("new-data-key")
                    .value.trim();
                const value = document
                    .getElementById("new-data-val")
                    .value.trim();
                if (!namespace || !key || !value) {
                    toast("Alle Felder sind pflicht.", true);
                    return;
                }
                try {
                    await api("/api/agents/" + agentId + "/data", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ namespace, key, value }),
                    });
                    closeModal();
                    toast("Gespeichert.");
                    selectAgent(agentId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            async function saveAgentMemory(agentId, idx) {
                const mem = _agentMemCache[agentId][idx];
                const newContent = document
                    .getElementById("edit-mem-content")
                    .value.trim();
                try {
                    await api("/api/agents/" + agentId + "/memories", {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            old_content: mem.content,
                            new_content: newContent,
                            subject_type: "agent",
                        }),
                    });
                    closeModal();
                    toast("Gespeichert.");
                    selectAgent(agentId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            function addAgentMemory(agentId) {
                openModal(
                    "Memory hinzufügen",
                    `
    <div class="modal-field"><div class="modal-label">Inhalt</div><textarea class="modal-input" id="new-mem-content" placeholder="Neue Beobachtung…"></textarea></div>
  `,
                    `
    <button class="btn" onclick="closeModal()">Abbrechen</button>
    <button class="btn btn-accent" onclick="saveNewAgentMemory(${agentId})">Speichern</button>
  `,
                );
            }

            async function saveNewAgentMemory(agentId) {
                const content = document
                    .getElementById("new-mem-content")
                    .value.trim();
                if (!content) return;
                try {
                    await api("/api/agents/" + agentId + "/memories", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            content,
                            subject_type: "agent",
                        }),
                    });
                    closeModal();
                    toast("Gespeichert.");
                    selectAgent(agentId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            async function triggerAgent(id) {
                try {
                    await api("/api/agents/" + id + "/trigger", {
                        method: "POST",
                    });
                    toast(
                        "Trigger gesetzt — läuft beim nächsten Scheduler-Durchlauf.",
                    );
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            async function stopAgent(id) {
                confirmModal("Agent wirklich stoppen?", async () => {
                    try {
                        await api("/api/agents/" + id, { method: "DELETE" });
                        toast("Agent gestoppt.");
                        goBack();
                        await loadAgents();
                    } catch (e) {
                        toast("Fehler.", true);
                    }
                });
            }

            function editAgent(id) {
                const a = agentsData.find((x) => x.id === id);
                openModal(
                    "Agent bearbeiten",
                    `
    <div class="modal-field"><div class="modal-label">Name</div><input class="modal-input" id="edit-name" value="${a.name}" /></div>
    <div class="modal-field"><div class="modal-label">Zeitplan (Cron)</div><input class="modal-input" id="edit-schedule" value="${a.schedule}" /></div>
    <div class="modal-field"><div class="modal-label">Anweisung</div><textarea class="modal-input" id="edit-instruction" style="min-height:140px;">${a.instruction}</textarea></div>
  `,
                    `
    <button class="btn" onclick="closeModal()">Abbrechen</button>
    <button class="btn btn-accent" onclick="saveAgent(${id})">Speichern</button>
  `,
                );
            }

            async function saveAgent(id) {
                const name = document.getElementById("edit-name").value.trim();
                const schedule = document
                    .getElementById("edit-schedule")
                    .value.trim();
                const instruction = document
                    .getElementById("edit-instruction")
                    .value.trim();
                try {
                    await api("/api/agents/" + id, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name, schedule, instruction }),
                    });
                    closeModal();
                    toast("Gespeichert.");
                    await loadAgents();
                    selectAgent(id);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            async function loadMemory() {
                try {
                    const [users, groups] = await Promise.all([
                        api("/api/users"),
                        api("/api/groups"),
                    ]);
                    memData.users = users;
                    memData.groups = groups;
                    renderMemoryList();
                } catch (e) {
                    document.getElementById("memory-list").innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:8px;">Fehler.</div>';
                }
            }

            function switchMemMode(mode) {
                memMode = mode;
                currentMemSubjectId = null;
                document
                    .getElementById("mem-users-btn")
                    .classList.toggle("active", mode === "users");
                document
                    .getElementById("mem-groups-btn")
                    .classList.toggle("active", mode === "groups");
                document.getElementById("memory-detail").innerHTML =
                    '<div class="empty-state">← Eintrag auswählen</div>';
                document
                    .getElementById("memory-detail")
                    .classList.remove("visible");
                document
                    .getElementById("memory-sidebar")
                    .classList.remove("hidden");
                document
                    .getElementById("topbar-back")
                    .classList.remove("visible");
                document.getElementById("topbar-dot").style.display = "";
                document.getElementById("topbar-name").textContent =
                    "Bob Dashboard";
                renderMemoryList();
            }

            function renderMemoryList(filter) {
                const items = memData[memMode] || [];
                const q = (
                    filter ||
                    document.getElementById("memory-search").value ||
                    ""
                ).toLowerCase();
                const filtered = q
                    ? items.filter((i) => {
                          const name =
                              memMode === "users"
                                  ? (
                                        (i.first_name || "") +
                                        " " +
                                        (i.last_name || "") +
                                        " " +
                                        (i.username || "")
                                    ).toLowerCase()
                                  : (i.title || "").toLowerCase();
                          return name.includes(q) || String(i.id).includes(q);
                      })
                    : items;
                if (!filtered.length) {
                    document.getElementById("memory-list").innerHTML =
                        '<div style="font-size:13px;color:var(--text3);padding:8px;">Keine Einträge.</div>';
                    return;
                }
                document.getElementById("memory-list").innerHTML = filtered
                    .map((i) => {
                        const name =
                            memMode === "users"
                                ? [i.first_name, i.last_name]
                                      .filter(Boolean)
                                      .join(" ") ||
                                  i.username ||
                                  String(i.id)
                                : i.title || String(i.id);
                        const sub =
                            memMode === "users"
                                ? i.username
                                    ? "@" + i.username
                                    : i.timezone
                                : fmt(i.first_seen_at);
                        return `<div class="sidebar-item" data-id="${i.id}" onclick="selectMemItem(${i.id})">
      <div class="si-name">${name}</div>
      <div class="si-meta">${sub || ""}</div>
    </div>`;
                    })
                    .join("");
            }

            async function selectMemItem(id) {
                currentMemSubjectId = id;
                document
                    .querySelectorAll("#memory-list .sidebar-item")
                    .forEach((el) =>
                        el.classList.toggle(
                            "active",
                            Number(el.dataset.id) === id,
                        ),
                    );
                const item = memData[memMode].find((i) => i.id === id);
                const name =
                    memMode === "users"
                        ? [item.first_name, item.last_name]
                              .filter(Boolean)
                              .join(" ") ||
                          item.username ||
                          String(id)
                        : item.title || String(id);
                showDetail(
                    document.getElementById("memory-detail"),
                    document.getElementById("memory-sidebar"),
                    name,
                );
                await renderMemDetail(id);
            }

            async function renderMemDetail(id) {
                const detail = document.getElementById("memory-detail");
                detail.innerHTML = '<div class="empty-state">Lade…</div>';
                try {
                    const endpoint =
                        memMode === "users"
                            ? "/api/users/" + id + "/memories"
                            : "/api/groups/" + id + "/memories";
                    const mems = await api(endpoint);
                    _memCache[id] = mems;
                    const availableTypes =
                        memMode === "users"
                            ? ["user", "reflection"]
                            : ["group", "bot", "reflection"];
                    const byType = {};
                    availableTypes.forEach((t) => (byType[t] = []));
                    mems.forEach((m, i) => {
                        if (byType[m.type])
                            byType[m.type].push({ ...m, _globalIdx: i });
                    });

                    detail.innerHTML = `
      <div class="action-bar">
        <button class="btn btn-accent" onclick="addMemory(${id})">+ Neue Memory</button>
      </div>
      ${availableTypes
          .map(
              (type) => `
        <div class="detail-block">
          <div class="detail-block-title"><span>${type} (${byType[type].length})</span></div>
          <div class="mem-list">
            ${byType[type]
                .map(
                    (m) => `
              <div class="mem-row">
                <span class="badge badge-${m.type}" style="flex-shrink:0;margin-top:2px;">${m.type}</span>
                <div class="mem-text">${m.content}</div>
                <div class="mem-date">${fmt(m.created_at)}</div>
                <div class="mem-actions">
                  <button class="btn btn-sm" data-subject="${id}" data-idx="${m._globalIdx}" data-action="edit-mem">Edit</button>
                  <button class="btn btn-sm btn-danger" data-subject="${id}" data-idx="${m._globalIdx}" data-action="delete-mem">Del</button>
                </div>
              </div>
            `,
                )
                .join("")}
            ${!byType[type].length ? '<div style="font-size:13px;color:var(--text3);padding:6px 0;">Keine Einträge.</div>' : ""}
          </div>
        </div>
      `,
          )
          .join("")}
    `;
                    detail.removeEventListener("click", handleMemDetailClick);
                    detail.addEventListener("click", handleMemDetailClick);
                } catch (e) {
                    detail.innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:1rem;">Fehler.</div>';
                }
            }

            function handleMemDetailClick(e) {
                const btn = e.target.closest("[data-action]");
                if (!btn) return;
                const action = btn.dataset.action;
                const subjectId = Number(btn.dataset.subject);
                const idx = Number(btn.dataset.idx);
                const mem = _memCache[subjectId][idx];
                if (!mem) return;
                if (action === "edit-mem") {
                    openModal(
                        "Memory bearbeiten",
                        `
      <div class="modal-field"><div class="modal-label">Typ</div><input class="modal-input" value="${mem.type}" disabled /></div>
      <div class="modal-field"><div class="modal-label">Inhalt</div><textarea class="modal-input" id="edit-mem-content" style="min-height:100px;">${mem.content}</textarea></div>
    `,
                        `
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-accent" onclick="saveMemory(${subjectId}, ${idx})">Speichern</button>
    `,
                    );
                } else if (action === "delete-mem") {
                    const endpoint =
                        memMode === "users"
                            ? "/api/users/" + subjectId + "/memories"
                            : "/api/groups/" + subjectId + "/memories";
                    confirmModal("Memory löschen?", () => {
                        api(endpoint, {
                            method: "DELETE",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                content: mem.content,
                                subject_type: mem.type,
                            }),
                        })
                            .then(() => {
                                toast("Gelöscht.");
                                renderMemDetail(subjectId);
                            })
                            .catch(() => toast("Fehler.", true));
                    });
                }
            }

            async function saveMemory(subjectId, idx) {
                const mem = _memCache[subjectId][idx];
                const newContent = document
                    .getElementById("edit-mem-content")
                    .value.trim();
                const endpoint =
                    memMode === "users"
                        ? "/api/users/" + subjectId + "/memories"
                        : "/api/groups/" + subjectId + "/memories";
                try {
                    await api(endpoint, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            old_content: mem.content,
                            new_content: newContent,
                            subject_type: mem.type,
                        }),
                    });
                    closeModal();
                    toast("Gespeichert.");
                    renderMemDetail(subjectId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            function addMemory(subjectId) {
                const types =
                    memMode === "users"
                        ? ["user", "reflection"]
                        : ["group", "bot", "reflection"];
                openModal(
                    "Memory hinzufügen",
                    `
    <div class="modal-field">
      <div class="modal-label">Typ</div>
      <select class="modal-select" id="new-mem-type">${types.map((t) => `<option value="${t}">${t}</option>`).join("")}</select>
    </div>
    <div class="modal-field"><div class="modal-label">Inhalt</div><textarea class="modal-input" id="new-mem-content" placeholder="Inhalt…"></textarea></div>
  `,
                    `
    <button class="btn" onclick="closeModal()">Abbrechen</button>
    <button class="btn btn-accent" onclick="saveNewMemory(${subjectId})">Speichern</button>
  `,
                );
            }

            async function saveNewMemory(subjectId) {
                const content = document
                    .getElementById("new-mem-content")
                    .value.trim();
                const subject_type =
                    document.getElementById("new-mem-type").value;
                if (!content) return;
                const endpoint =
                    memMode === "users"
                        ? "/api/users/" + subjectId + "/memories"
                        : "/api/groups/" + subjectId + "/memories";
                try {
                    await api(endpoint, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ content, subject_type }),
                    });
                    closeModal();
                    toast("Gespeichert.");
                    renderMemDetail(subjectId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            let _usagePage = 0;
            const _usageLimit = 10;

            document
                .getElementById("usage-tabs")
                .querySelectorAll(".agent-tab")
                .forEach((tab) => {
                    tab.addEventListener("click", function () {
                        document
                            .querySelectorAll("#usage-tabs .agent-tab")
                            .forEach((t) => t.classList.remove("active"));
                        document
                            .getElementById("usage-tab-caller")
                            .classList.remove("active");
                        document
                            .getElementById("usage-tab-history")
                            .classList.remove("active");
                        this.classList.add("active");
                        document
                            .getElementById("usage-tab-" + this.dataset.tab)
                            .classList.add("active");
                    });
                });

            async function loadUsage() {
                try {
                    const u = await api("/api/usage");
                    const total = u.total_input + u.total_output;
                    const maxTokens = u.by_caller.reduce(
                        (m, c) => Math.max(m, c.input + c.output),
                        1,
                    );
                    document.getElementById("usage-tab-caller").innerHTML = `
      <div class="metrics-grid">
        <div class="metric-card"><div class="metric-label">input tokens</div><div class="metric-value">${fmtNum(u.total_input)}</div></div>
        <div class="metric-card"><div class="metric-label">output tokens</div><div class="metric-value">${fmtNum(u.total_output)}</div></div>
        <div class="metric-card"><div class="metric-label">gesamt</div><div class="metric-value">${fmtNum(total)}</div></div>
      </div>
      <div class="detail-block">
        <div class="detail-block-title"><span>Nach Caller</span></div>
        <div class="caller-list">
          ${u.by_caller
              .map((c) => {
                  const t = c.input + c.output;
                  const pct = Math.round((t / maxTokens) * 100);
                  return `<div class="caller-row">
              <div class="caller-name">${c.caller}</div>
              <div class="caller-bar-bg"><div class="caller-bar-fg" style="width:${pct}%"></div></div>
              <div class="caller-tokens">${fmtNum(t)}</div>
            </div>`;
              })
              .join("")}
        </div>
      </div>
    `;
                } catch (e) {
                    document.getElementById("usage-tab-caller").innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:1rem;">Fehler.</div>';
                }
                await loadUsageHistory(0);
            }

            async function loadUsageHistory(page) {
                _usagePage = page;
                const el = document.getElementById("usage-tab-history");
                el.innerHTML = '<div class="empty-state">Lade…</div>';
                try {
                    const h = await api(
                        "/api/usage/history?page=" +
                            page +
                            "&limit=" +
                            _usageLimit,
                    );
                    const totalPages = Math.ceil(h.total / _usageLimit);
                    el.innerHTML = `
      <div class="detail-block">
        <div class="detail-block-title">
          <span>Calls (${fmtNum(h.total)})</span>
          <span style="font-size:11px;color:var(--text3);">Seite ${page + 1} / ${totalPages}</span>
        </div>
        <div style="display:flex;flex-direction:column;">
          ${h.items
              .map(
                  (item) => `
            <div style="display:flex;align-items:baseline;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--border);">
              <div style="font-family:var(--mono);font-size:11px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.caller}</div>
              <div style="font-family:var(--mono);font-size:11px;color:var(--accent);flex-shrink:0;">↑${fmtNum(item.input_tokens)}</div>
              <div style="font-family:var(--mono);font-size:11px;color:var(--blue);flex-shrink:0;">↓${fmtNum(item.output_tokens)}</div>
              <div style="font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;">${fmt(item.created_at)}</div>
            </div>
          `,
              )
              .join("")}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;">
          <button class="btn btn-sm" onclick="loadUsageHistory(${page - 1})" ${page === 0 ? 'disabled style="opacity:0.3;"' : ""}>← Zurück</button>
          <button class="btn btn-sm" onclick="loadUsageHistory(${page + 1})" ${page >= totalPages - 1 ? 'disabled style="opacity:0.3;"' : ""}>Weiter →</button>
        </div>
      </div>
    `;
                } catch (e) {
                    el.innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:1rem;">Fehler.</div>';
                }
            }

            async function loadTriggers() {
                const el = document.getElementById("triggers-detail");
                try {
                    const triggers = await api("/api/triggers");
                    if (!triggers.length) {
                        el.innerHTML =
                            '<div class="empty-state">Keine Trigger.</div>';
                        return;
                    }
                    el.innerHTML = triggers
                        .map(
                            (t) => `
      <div class="trigger-item">
        <div class="trigger-header">
          <span class="trigger-name">${t.target_agent_name}</span>
          <span class="badge ${t.processed_at ? "badge-done" : "badge-pending"}">${t.processed_at ? "verarbeitet" : "ausstehend"}</span>
        </div>
        <div class="trigger-meta">geplant ${fmt(t.scheduled_for)} · erstellt ${fmt(t.created_at)}</div>
        ${Object.keys(t.payload || {}).length ? `<div class="trigger-meta" style="margin-top:2px;">payload: ${JSON.stringify(t.payload)}</div>` : ""}
      </div>
    `,
                        )
                        .join("");
                } catch (e) {
                    el.innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:1rem;">Fehler.</div>';
                }
            }

            function loadAll() {
                loadAgents();
                loadMemory();
                loadUsage();
                loadTriggers();
            }
            loadAll();
        </script>
    </body>
</html>
