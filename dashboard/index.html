<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bob Dashboard</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0e0e0f;
                --bg2: #161618;
                --bg3: #1e1e21;
                --bg4: #26262a;
                --border: rgba(255, 255, 255, 0.07);
                --border2: rgba(255, 255, 255, 0.13);
                --text: #e8e8e6;
                --text2: #888884;
                --text3: #555552;
                --accent: #1d9e75;
                --accent-dim: rgba(29, 158, 117, 0.15);
                --red: #e24b4a;
                --red-dim: rgba(226, 75, 74, 0.12);
                --amber: #ef9f27;
                --amber-dim: rgba(239, 159, 39, 0.12);
                --blue: #378add;
                --blue-dim: rgba(55, 138, 221, 0.12);
                --font: "Syne", sans-serif;
                --mono: "IBM Plex Mono", monospace;
                --radius: 10px;
                --radius-sm: 6px;
            }
            body {
                font-family: var(--font);
                background: var(--bg);
                color: var(--text);
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 1.5rem;
                height: 52px;
                border-bottom: 0.5px solid var(--border);
                flex-shrink: 0;
            }
            .topbar-left {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .topbar-name {
                font-size: 15px;
                font-weight: 600;
                letter-spacing: -0.01em;
            }
            .topbar-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--accent);
                box-shadow: 0 0 6px var(--accent);
            }
            nav {
                display: flex;
                gap: 2px;
            }
            .nav-btn {
                font-family: var(--font);
                font-size: 13px;
                font-weight: 500;
                padding: 6px 14px;
                border-radius: var(--radius-sm);
                border: none;
                background: transparent;
                color: var(--text2);
                cursor: pointer;
                transition:
                    background 0.1s,
                    color 0.1s;
            }
            .nav-btn:hover {
                background: var(--bg3);
                color: var(--text);
            }
            .nav-btn.active {
                background: var(--bg3);
                color: var(--text);
            }
            .layout {
                display: flex;
                flex: 1;
                overflow: hidden;
            }
            .sidebar {
                width: 240px;
                flex-shrink: 0;
                border-right: 0.5px solid var(--border);
                overflow-y: auto;
                padding: 1rem;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .sidebar-search {
                font-family: var(--font);
                font-size: 13px;
                width: 100%;
                padding: 7px 10px;
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
                margin-bottom: 8px;
            }
            .sidebar-search:focus {
                outline: none;
                border-color: var(--border2);
            }
            .sidebar-item {
                padding: 9px 10px;
                border-radius: var(--radius-sm);
                cursor: pointer;
                border: 0.5px solid transparent;
                transition: background 0.1s;
            }
            .sidebar-item:hover {
                background: var(--bg3);
            }
            .sidebar-item.active {
                background: var(--bg3);
                border-color: var(--border);
            }
            .si-name {
                font-size: 13px;
                font-weight: 500;
                color: var(--text);
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .si-meta {
                font-size: 11px;
                color: var(--text3);
                margin-top: 2px;
                font-family: var(--mono);
            }
            .detail {
                flex: 1;
                overflow-y: auto;
                padding: 1.5rem;
            }
            .empty-state {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 200px;
                font-size: 13px;
                color: var(--text3);
            }
            .section {
                display: none;
            }
            .section.active {
                display: flex;
                height: 100%;
                overflow: hidden;
            }
            .badge {
                font-size: 10px;
                font-family: var(--mono);
                padding: 2px 7px;
                border-radius: 99px;
                font-weight: 500;
            }
            .badge-active {
                background: var(--accent-dim);
                color: var(--accent);
            }
            .badge-inactive {
                background: var(--bg4);
                color: var(--text3);
            }
            .badge-pending {
                background: var(--amber-dim);
                color: var(--amber);
            }
            .badge-done {
                background: var(--bg4);
                color: var(--text3);
            }
            .badge-user {
                background: var(--blue-dim);
                color: var(--blue);
            }
            .badge-reflection {
                background: var(--amber-dim);
                color: var(--amber);
            }
            .badge-group {
                background: var(--bg4);
                color: var(--text3);
            }
            .badge-bot {
                background: var(--accent-dim);
                color: var(--accent);
            }
            .detail-block {
                margin-bottom: 1.5rem;
            }
            .detail-block-title {
                font-size: 10px;
                font-family: var(--mono);
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .detail-text {
                font-size: 13px;
                color: var(--text);
                line-height: 1.6;
            }
            .detail-mono {
                font-family: var(--mono);
                font-size: 12px;
                color: var(--text2);
                margin-bottom: 2px;
            }
            .action-bar {
                display: flex;
                gap: 8px;
                margin-bottom: 1.25rem;
                flex-wrap: wrap;
            }
            .btn {
                font-family: var(--font);
                font-size: 12px;
                font-weight: 500;
                padding: 5px 12px;
                border-radius: var(--radius-sm);
                border: 0.5px solid var(--border2);
                background: transparent;
                color: var(--text2);
                cursor: pointer;
                transition:
                    background 0.1s,
                    color 0.1s;
            }
            .btn:hover {
                background: var(--bg3);
                color: var(--text);
            }
            .btn-danger {
                border-color: var(--red);
                color: var(--red);
            }
            .btn-danger:hover {
                background: var(--red-dim);
            }
            .btn-accent {
                border-color: var(--accent);
                color: var(--accent);
            }
            .btn-accent:hover {
                background: var(--accent-dim);
            }
            .btn-sm {
                font-size: 11px;
                padding: 3px 8px;
            }
            .state-grid {
                display: grid;
                gap: 6px;
            }
            .state-card {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 10px 12px;
            }
            .state-card-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 4px;
            }
            .state-key {
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text3);
            }
            .state-val {
                font-size: 12px;
                color: var(--text2);
                line-height: 1.5;
                word-break: break-word;
                white-space: pre-wrap;
            }
            .state-actions {
                display: flex;
                gap: 4px;
                opacity: 0;
                transition: opacity 0.1s;
            }
            .state-card:hover .state-actions {
                opacity: 1;
            }
            .mem-list {
                display: flex;
                flex-direction: column;
            }
            .mem-row {
                display: flex;
                align-items: flex-start;
                gap: 10px;
                padding: 8px 0;
                border-bottom: 0.5px solid var(--border);
            }
            .mem-row:last-child {
                border-bottom: none;
            }
            .mem-text {
                font-size: 13px;
                color: var(--text);
                line-height: 1.5;
                flex: 1;
            }
            .mem-date {
                font-size: 10px;
                font-family: var(--mono);
                color: var(--text3);
                flex-shrink: 0;
                padding-top: 2px;
            }
            .mem-actions {
                display: flex;
                gap: 4px;
                opacity: 0;
                transition: opacity 0.1s;
                flex-shrink: 0;
            }
            .mem-row:hover .mem-actions {
                opacity: 1;
            }
            .metrics-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin-bottom: 1.5rem;
            }
            .metric-card {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius);
                padding: 1rem 1.25rem;
            }
            .metric-label {
                font-size: 11px;
                color: var(--text3);
                font-family: var(--mono);
                margin-bottom: 6px;
            }
            .metric-value {
                font-size: 24px;
                font-weight: 600;
                color: var(--text);
                letter-spacing: -0.02em;
            }
            .caller-list {
                display: flex;
                flex-direction: column;
            }
            .caller-row {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 7px 0;
                border-bottom: 0.5px solid var(--border);
            }
            .caller-row:last-child {
                border-bottom: none;
            }
            .caller-name {
                font-family: var(--mono);
                font-size: 11px;
                color: var(--text2);
                width: 180px;
                flex-shrink: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .caller-bar-bg {
                flex: 1;
                background: var(--bg3);
                border-radius: 2px;
                height: 3px;
            }
            .caller-bar-fg {
                height: 3px;
                border-radius: 2px;
                background: var(--accent);
            }
            .caller-tokens {
                font-family: var(--mono);
                font-size: 11px;
                color: var(--text3);
                width: 80px;
                text-align: right;
            }
            .trigger-item {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 10px 14px;
                margin-bottom: 8px;
            }
            .trigger-header {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 4px;
            }
            .trigger-name {
                font-size: 13px;
                font-weight: 500;
            }
            .trigger-meta {
                font-size: 11px;
                font-family: var(--mono);
                color: var(--text3);
            }
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                z-index: 100;
                align-items: center;
                justify-content: center;
            }
            .modal-overlay.open {
                display: flex;
            }
            .modal {
                background: var(--bg2);
                border: 0.5px solid var(--border2);
                border-radius: var(--radius);
                padding: 1.5rem;
                width: 480px;
                max-width: 90vw;
            }
            .modal-title {
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 1rem;
            }
            .modal-field {
                margin-bottom: 12px;
            }
            .modal-label {
                font-size: 11px;
                font-family: var(--mono);
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 0.06em;
                margin-bottom: 4px;
            }
            .modal-input {
                font-family: var(--font);
                font-size: 13px;
                width: 100%;
                padding: 7px 10px;
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
            }
            .modal-input:focus {
                outline: none;
                border-color: var(--border2);
            }
            textarea.modal-input {
                resize: vertical;
                min-height: 80px;
                font-family: var(--font);
                line-height: 1.5;
            }
            .modal-select {
                font-family: var(--font);
                font-size: 13px;
                width: 100%;
                padding: 7px 10px;
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
            }
            .modal-actions {
                display: flex;
                gap: 8px;
                justify-content: flex-end;
                margin-top: 1rem;
            }
            .toast {
                position: fixed;
                bottom: 1.5rem;
                right: 1.5rem;
                background: var(--bg3);
                border: 0.5px solid var(--border2);
                border-radius: var(--radius-sm);
                padding: 10px 16px;
                font-size: 13px;
                color: var(--text);
                z-index: 200;
                opacity: 0;
                transform: translateY(8px);
                transition:
                    opacity 0.2s,
                    transform 0.2s;
                pointer-events: none;
            }
            .toast.show {
                opacity: 1;
                transform: translateY(0);
            }
            .toast.error {
                border-color: var(--red);
                color: var(--red);
            }
            .sub-tabs {
                display: flex;
                gap: 6px;
                margin-bottom: 12px;
            }
        </style>
    </head>
    <body>
        <div class="topbar">
            <div class="topbar-left">
                <div class="topbar-dot"></div>
                <div class="topbar-name">Bob Dashboard</div>
            </div>
            <nav>
                <button class="nav-btn active" data-section="agents">
                    Agenten
                </button>
                <button class="nav-btn" data-section="memory">Memory</button>
                <button class="nav-btn" data-section="usage">Usage</button>
                <button class="nav-btn" data-section="triggers">
                    Triggers
                </button>
            </nav>
            <div style="width: 180px"></div>
        </div>

        <div class="layout">
            <div class="section active" id="section-agents">
                <div class="sidebar" id="agents-sidebar">
                    <input
                        class="sidebar-search"
                        id="agents-search"
                        placeholder="Suchen…"
                    />
                    <div id="agents-list">
                        <div
                            style="
                                font-size: 13px;
                                color: var(--text3);
                                padding: 8px;
                            "
                        >
                            Lade…
                        </div>
                    </div>
                </div>
                <div class="detail" id="agents-detail">
                    <div class="empty-state">← Agent auswählen</div>
                </div>
            </div>

            <div class="section" id="section-memory">
                <div class="sidebar" id="memory-sidebar">
                    <div class="sub-tabs">
                        <button
                            class="nav-btn active"
                            id="mem-users-btn"
                            onclick="switchMemMode('users')"
                        >
                            Nutzer
                        </button>
                        <button
                            class="nav-btn"
                            id="mem-groups-btn"
                            onclick="switchMemMode('groups')"
                        >
                            Gruppen
                        </button>
                    </div>
                    <input
                        class="sidebar-search"
                        id="memory-search"
                        placeholder="Suchen…"
                    />
                    <div id="memory-list">
                        <div
                            style="
                                font-size: 13px;
                                color: var(--text3);
                                padding: 8px;
                            "
                        >
                            Lade…
                        </div>
                    </div>
                </div>
                <div class="detail" id="memory-detail">
                    <div class="empty-state">← Eintrag auswählen</div>
                </div>
            </div>

            <div class="section" id="section-usage">
                <div class="detail" id="usage-detail" style="width: 100%">
                    <div class="empty-state">Lade…</div>
                </div>
            </div>

            <div class="section" id="section-triggers">
                <div class="detail" id="triggers-detail" style="width: 100%">
                    <div class="empty-state">Lade…</div>
                </div>
            </div>
        </div>

        <div
            class="modal-overlay"
            id="modal-overlay"
            onclick="closeModal(event)"
        >
            <div class="modal" id="modal">
                <div class="modal-title" id="modal-title"></div>
                <div id="modal-body"></div>
                <div class="modal-actions" id="modal-actions"></div>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script>
            const BASE = "__API_URL__";
            let memMode = "users";
            let memData = { users: [], groups: [] };
            let agentsData = [];
            let currentMemSubjectId = null;

            function api(path, opts) {
                return fetch(BASE + path, opts).then((r) => {
                    if (!r.ok) throw new Error(r.status);
                    return r.json();
                });
            }

            function fmt(iso) {
                if (!iso) return "—";
                const d = new Date(iso);
                return (
                    d.toLocaleDateString("de-DE", {
                        day: "2-digit",
                        month: "2-digit",
                        year: "2-digit",
                    }) +
                    " " +
                    d.toLocaleTimeString("de-DE", {
                        hour: "2-digit",
                        minute: "2-digit",
                    })
                );
            }

            function fmtNum(n) {
                return Number(n).toLocaleString("de-DE");
            }

            function toast(msg, isError) {
                const el = document.getElementById("toast");
                el.textContent = msg;
                el.className = "toast show" + (isError ? " error" : "");
                setTimeout(() => (el.className = "toast"), 2500);
            }

            function openModal(title, bodyHtml, actions) {
                document.getElementById("modal-title").textContent = title;
                document.getElementById("modal-body").innerHTML = bodyHtml;
                document.getElementById("modal-actions").innerHTML = actions;
                document.getElementById("modal-overlay").classList.add("open");
            }

            function closeModal(e) {
                if (
                    !e ||
                    e.target === document.getElementById("modal-overlay")
                ) {
                    document
                        .getElementById("modal-overlay")
                        .classList.remove("open");
                }
            }

            document
                .querySelectorAll(".nav-btn[data-section]")
                .forEach((btn) => {
                    btn.addEventListener("click", function () {
                        document
                            .querySelectorAll(".nav-btn[data-section]")
                            .forEach((b) => b.classList.remove("active"));
                        document
                            .querySelectorAll(".section")
                            .forEach((s) => s.classList.remove("active"));
                        this.classList.add("active");
                        document
                            .getElementById("section-" + this.dataset.section)
                            .classList.add("active");
                    });
                });

            document
                .getElementById("agents-search")
                .addEventListener("input", function () {
                    renderAgentsList(this.value);
                });
            document
                .getElementById("memory-search")
                .addEventListener("input", function () {
                    renderMemoryList(this.value);
                });

            async function loadAgents() {
                try {
                    agentsData = await api("/api/agents");
                    renderAgentsList();
                } catch (e) {
                    document.getElementById("agents-list").innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:8px;">Backend nicht erreichbar.</div>';
                }
            }

            function renderAgentsList(filter) {
                const q = (filter || "").toLowerCase();
                const filtered = q
                    ? agentsData.filter(
                          (a) =>
                              a.name.toLowerCase().includes(q) ||
                              (a.type || "").includes(q),
                      )
                    : agentsData;
                if (!filtered.length) {
                    document.getElementById("agents-list").innerHTML =
                        '<div style="font-size:13px;color:var(--text3);padding:8px;">Keine Agenten.</div>';
                    return;
                }
                document.getElementById("agents-list").innerHTML = filtered
                    .map(
                        (a) => `
    <div class="sidebar-item" data-id="${a.id}" onclick="selectAgent(${a.id})">
      <div class="si-name">${a.name}<span class="badge ${a.is_active ? "badge-active" : "badge-inactive"}">${a.is_active ? "aktiv" : "inaktiv"}</span></div>
      <div class="si-meta">${a.type || "—"} · ${a.schedule}</div>
    </div>
  `,
                    )
                    .join("");
            }

            async function selectAgent(id) {
                document
                    .querySelectorAll("#agents-list .sidebar-item")
                    .forEach((el) =>
                        el.classList.toggle(
                            "active",
                            Number(el.dataset.id) === id,
                        ),
                    );
                const a = agentsData.find((x) => x.id === id);
                const detail = document.getElementById("agents-detail");
                detail.innerHTML = '<div class="empty-state">Lade…</div>';
                try {
                    const [state, memories] = await Promise.all([
                        api("/api/agents/" + id + "/state"),
                        api("/api/agents/" + id + "/memories"),
                    ]);
                    detail.innerHTML = `
      <div class="action-bar">
        <button class="btn btn-accent" onclick="triggerAgent(${id})">Jetzt ausführen</button>
        <button class="btn" onclick="editAgent(${id})">Bearbeiten</button>
        ${a.is_active ? `<button class="btn btn-danger" onclick="stopAgent(${id})">Stoppen</button>` : ""}
      </div>
      <div class="detail-block">
        <div class="detail-block-title">Anweisung</div>
        <div class="detail-text">${a.instruction || "—"}</div>
      </div>
      <div class="detail-block">
        <div class="detail-block-title">Meta</div>
        <div class="detail-mono">Zeitplan: ${a.schedule}</div>
        <div class="detail-mono">Letzter Lauf: ${fmt(a.last_run_at)}</div>
        <div class="detail-mono">Nächster Lauf: ${fmt(a.next_run_at)}</div>
        <div class="detail-mono">Typ: ${a.type || "—"}</div>
        ${a.data_reads && a.data_reads.length ? `<div class="detail-mono" style="margin-top:4px;">data_reads: ${JSON.stringify(a.data_reads)}</div>` : ""}
      </div>
      <div class="detail-block">
        <div class="detail-block-title">
          <span>State (${state.length})</span>
        </div>
        <div class="state-grid" id="state-grid-${id}">
          ${state.map((s) => stateCardHtml(id, s)).join("")}
        </div>
      </div>
      <div class="detail-block">
        <div class="detail-block-title">
          <span>Memories (${memories.length})</span>
          <button class="btn btn-sm" onclick="addAgentMemory(${id})">+ Neu</button>
        </div>
        <div class="mem-list" id="agent-mem-list-${id}">
          ${memories.map((m) => agentMemRowHtml(id, m)).join("")}
          ${!memories.length ? '<div style="font-size:13px;color:var(--text3);padding:8px 0;">Keine Memories.</div>' : ""}
        </div>
      </div>
    `;
                } catch (e) {
                    detail.innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:1rem;">Fehler beim Laden.</div>';
                }
            }

            function stateCardHtml(agentId, s) {
                const safeKey = encodeURIComponent(s.key);
                return `<div class="state-card">
    <div class="state-card-header">
      <div class="state-key">${s.key}</div>
      <div class="state-actions">
        <button class="btn btn-sm" onclick="editStateEntry(${agentId}, '${s.key}', this)">Bearbeiten</button>
        <button class="btn btn-sm btn-danger" onclick="deleteStateEntry(${agentId}, '${s.key}', this)">Löschen</button>
      </div>
    </div>
    <div class="state-val">${s.value}</div>
  </div>`;
            }

            function agentMemRowHtml(agentId, m) {
                return `<div class="mem-row">
    <div class="mem-text">${m.content}</div>
    <div class="mem-date">${fmt(m.created_at)}</div>
    <div class="mem-actions">
      <button class="btn btn-sm" onclick="editAgentMemory(${agentId}, '${escStr(m.content)}', this)">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteAgentMemory(${agentId}, '${escStr(m.content)}', this)">Del</button>
    </div>
  </div>`;
            }

            function escStr(s) {
                return s.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
            }

            async function triggerAgent(id) {
                try {
                    await api("/api/agents/" + id + "/trigger", {
                        method: "POST",
                    });
                    toast(
                        "Trigger gesetzt — läuft beim nächsten Scheduler-Durchlauf.",
                    );
                } catch (e) {
                    toast("Fehler beim Triggern.", true);
                }
            }

            async function stopAgent(id) {
                if (!confirm("Agent wirklich stoppen?")) return;
                try {
                    await api("/api/agents/" + id, { method: "DELETE" });
                    toast("Agent gestoppt.");
                    await loadAgents();
                    document.getElementById("agents-detail").innerHTML =
                        '<div class="empty-state">Agent gestoppt.</div>';
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            function editAgent(id) {
                const a = agentsData.find((x) => x.id === id);
                openModal(
                    "Agent bearbeiten",
                    `
    <div class="modal-field"><div class="modal-label">Name</div><input class="modal-input" id="edit-name" value="${a.name}" /></div>
    <div class="modal-field"><div class="modal-label">Zeitplan (Cron)</div><input class="modal-input" id="edit-schedule" value="${a.schedule}" /></div>
    <div class="modal-field"><div class="modal-label">Anweisung</div><textarea class="modal-input" id="edit-instruction">${a.instruction}</textarea></div>
  `,
                    `
    <button class="btn" onclick="closeModal()">Abbrechen</button>
    <button class="btn btn-accent" onclick="saveAgent(${id})">Speichern</button>
  `,
                );
            }

            async function saveAgent(id) {
                const name = document.getElementById("edit-name").value.trim();
                const schedule = document
                    .getElementById("edit-schedule")
                    .value.trim();
                const instruction = document
                    .getElementById("edit-instruction")
                    .value.trim();
                try {
                    await api("/api/agents/" + id, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name, schedule, instruction }),
                    });
                    closeModal();
                    toast("Agent gespeichert.");
                    await loadAgents();
                    selectAgent(id);
                } catch (e) {
                    toast("Fehler beim Speichern.", true);
                }
            }

            function editStateEntry(agentId, key, btn) {
                const card = btn.closest(".state-card");
                const currentVal = card.querySelector(".state-val").textContent;
                openModal(
                    "State bearbeiten",
                    `
    <div class="modal-field"><div class="modal-label">Key</div><input class="modal-input" value="${key}" disabled /></div>
    <div class="modal-field"><div class="modal-label">Value</div><textarea class="modal-input" id="edit-state-val" style="min-height:120px;">${currentVal}</textarea></div>
  `,
                    `
    <button class="btn" onclick="closeModal()">Abbrechen</button>
    <button class="btn btn-accent" onclick="saveStateEntry(${agentId}, '${key}')">Speichern</button>
  `,
                );
            }

            async function saveStateEntry(agentId, key) {
                const value = document.getElementById("edit-state-val").value;
                try {
                    await api(
                        "/api/agents/" +
                            agentId +
                            "/state/" +
                            encodeURIComponent(key),
                        {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ value }),
                        },
                    );
                    closeModal();
                    toast("State gespeichert.");
                    selectAgent(agentId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            async function deleteStateEntry(agentId, key, btn) {
                if (!confirm('State-Eintrag "' + key + '" wirklich löschen?'))
                    return;
                try {
                    await api(
                        "/api/agents/" +
                            agentId +
                            "/state/" +
                            encodeURIComponent(key),
                        { method: "DELETE" },
                    );
                    toast("State-Eintrag gelöscht.");
                    selectAgent(agentId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            function addAgentMemory(agentId) {
                openModal(
                    "Memory hinzufügen",
                    `
    <div class="modal-field"><div class="modal-label">Inhalt</div><textarea class="modal-input" id="new-mem-content" placeholder="Neue Beobachtung…"></textarea></div>
  `,
                    `
    <button class="btn" onclick="closeModal()">Abbrechen</button>
    <button class="btn btn-accent" onclick="saveNewAgentMemory(${agentId})">Speichern</button>
  `,
                );
            }

            async function saveNewAgentMemory(agentId) {
                const content = document
                    .getElementById("new-mem-content")
                    .value.trim();
                if (!content) return;
                try {
                    await api("/api/agents/" + agentId + "/memories", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            content,
                            subject_type: "agent",
                        }),
                    });
                    closeModal();
                    toast("Memory gespeichert.");
                    selectAgent(agentId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            function editAgentMemory(agentId, content, btn) {
                openModal(
                    "Memory bearbeiten",
                    `
    <div class="modal-field"><div class="modal-label">Inhalt</div><textarea class="modal-input" id="edit-mem-content">${content}</textarea></div>
  `,
                    `
    <button class="btn" onclick="closeModal()">Abbrechen</button>
    <button class="btn btn-accent" onclick="saveAgentMemory(${agentId}, '${escStr(content)}')">Speichern</button>
  `,
                );
            }

            async function saveAgentMemory(agentId, oldContent) {
                const newContent = document
                    .getElementById("edit-mem-content")
                    .value.trim();
                try {
                    await api("/api/agents/" + agentId + "/memories", {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            old_content: oldContent,
                            new_content: newContent,
                            subject_type: "agent",
                        }),
                    });
                    closeModal();
                    toast("Memory gespeichert.");
                    selectAgent(agentId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            async function deleteAgentMemory(agentId, content, btn) {
                if (!confirm("Memory wirklich löschen?")) return;
                try {
                    await api("/api/agents/" + agentId + "/memories", {
                        method: "DELETE",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            content,
                            subject_type: "agent",
                        }),
                    });
                    toast("Memory gelöscht.");
                    selectAgent(agentId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            async function loadMemory() {
                try {
                    const [users, groups] = await Promise.all([
                        api("/api/users"),
                        api("/api/groups"),
                    ]);
                    memData.users = users;
                    memData.groups = groups;
                    renderMemoryList();
                } catch (e) {
                    document.getElementById("memory-list").innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:8px;">Fehler.</div>';
                }
            }

            function switchMemMode(mode) {
                memMode = mode;
                currentMemSubjectId = null;
                document
                    .getElementById("mem-users-btn")
                    .classList.toggle("active", mode === "users");
                document
                    .getElementById("mem-groups-btn")
                    .classList.toggle("active", mode === "groups");
                document.getElementById("memory-detail").innerHTML =
                    '<div class="empty-state">← Eintrag auswählen</div>';
                renderMemoryList();
            }

            function renderMemoryList(filter) {
                const items = memData[memMode] || [];
                const q = (
                    filter ||
                    document.getElementById("memory-search").value ||
                    ""
                ).toLowerCase();
                const filtered = q
                    ? items.filter((i) => {
                          const name =
                              memMode === "users"
                                  ? (
                                        (i.first_name || "") +
                                        " " +
                                        (i.last_name || "") +
                                        " " +
                                        (i.username || "")
                                    ).toLowerCase()
                                  : (i.title || "").toLowerCase();
                          return name.includes(q) || String(i.id).includes(q);
                      })
                    : items;
                if (!filtered.length) {
                    document.getElementById("memory-list").innerHTML =
                        '<div style="font-size:13px;color:var(--text3);padding:8px;">Keine Einträge.</div>';
                    return;
                }
                document.getElementById("memory-list").innerHTML = filtered
                    .map((i) => {
                        const name =
                            memMode === "users"
                                ? [i.first_name, i.last_name]
                                      .filter(Boolean)
                                      .join(" ") ||
                                  i.username ||
                                  String(i.id)
                                : i.title || String(i.id);
                        const sub =
                            memMode === "users"
                                ? i.username
                                    ? "@" + i.username
                                    : i.timezone
                                : fmt(i.first_seen_at);
                        return `<div class="sidebar-item" data-id="${i.id}" onclick="selectMemItem(${i.id})">
      <div class="si-name">${name}</div>
      <div class="si-meta">${sub || ""}</div>
    </div>`;
                    })
                    .join("");
            }

            async function selectMemItem(id) {
                currentMemSubjectId = id;
                document
                    .querySelectorAll("#memory-list .sidebar-item")
                    .forEach((el) =>
                        el.classList.toggle(
                            "active",
                            Number(el.dataset.id) === id,
                        ),
                    );
                await renderMemDetail(id);
            }

            async function renderMemDetail(id) {
                const detail = document.getElementById("memory-detail");
                detail.innerHTML = '<div class="empty-state">Lade…</div>';
                try {
                    const endpoint =
                        memMode === "users"
                            ? "/api/users/" + id + "/memories"
                            : "/api/groups/" + id + "/memories";
                    const mems = await api(endpoint);
                    const availableTypes =
                        memMode === "users"
                            ? ["user", "reflection"]
                            : ["group", "bot", "reflection"];
                    const byType = {};
                    availableTypes.forEach((t) => (byType[t] = []));
                    mems.forEach((m) => {
                        if (byType[m.type]) byType[m.type].push(m);
                    });

                    detail.innerHTML = `
      <div class="action-bar">
        <button class="btn btn-accent" onclick="addMemory(${id})">+ Neue Memory</button>
      </div>
      ${availableTypes
          .map(
              (type) => `
        <div class="detail-block">
          <div class="detail-block-title"><span>${type} (${byType[type].length})</span></div>
          <div class="mem-list">
            ${byType[type].map((m) => memRowHtml(id, m)).join("")}
            ${!byType[type].length ? '<div style="font-size:13px;color:var(--text3);padding:6px 0;">Keine Einträge.</div>' : ""}
          </div>
        </div>
      `,
          )
          .join("")}
    `;
                } catch (e) {
                    detail.innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:1rem;">Fehler.</div>';
                }
            }

            function memRowHtml(subjectId, m) {
                return `<div class="mem-row">
    <span class="badge badge-${m.type}" style="flex-shrink:0;margin-top:2px;">${m.type}</span>
    <div class="mem-text">${m.content}</div>
    <div class="mem-date">${fmt(m.created_at)}</div>
    <div class="mem-actions">
      <button class="btn btn-sm" onclick="editMemory(${subjectId}, '${escStr(m.content)}', '${m.type}')">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="deleteMemory(${subjectId}, '${escStr(m.content)}', '${m.type}')">Del</button>
    </div>
  </div>`;
            }

            function addMemory(subjectId) {
                const types =
                    memMode === "users"
                        ? ["user", "reflection"]
                        : ["group", "bot", "reflection"];
                openModal(
                    "Memory hinzufügen",
                    `
    <div class="modal-field">
      <div class="modal-label">Typ</div>
      <select class="modal-select" id="new-mem-type">${types.map((t) => `<option value="${t}">${t}</option>`).join("")}</select>
    </div>
    <div class="modal-field"><div class="modal-label">Inhalt</div><textarea class="modal-input" id="new-mem-content" placeholder="Inhalt…"></textarea></div>
  `,
                    `
    <button class="btn" onclick="closeModal()">Abbrechen</button>
    <button class="btn btn-accent" onclick="saveNewMemory(${subjectId})">Speichern</button>
  `,
                );
            }

            async function saveNewMemory(subjectId) {
                const content = document
                    .getElementById("new-mem-content")
                    .value.trim();
                const subject_type =
                    document.getElementById("new-mem-type").value;
                if (!content) return;
                const endpoint =
                    memMode === "users"
                        ? "/api/users/" + subjectId + "/memories"
                        : "/api/groups/" + subjectId + "/memories";
                try {
                    await api(endpoint, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ content, subject_type }),
                    });
                    closeModal();
                    toast("Memory gespeichert.");
                    renderMemDetail(subjectId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            function editMemory(subjectId, content, type) {
                openModal(
                    "Memory bearbeiten",
                    `
    <div class="modal-field"><div class="modal-label">Typ</div><input class="modal-input" value="${type}" disabled /></div>
    <div class="modal-field"><div class="modal-label">Inhalt</div><textarea class="modal-input" id="edit-mem-content">${content}</textarea></div>
  `,
                    `
    <button class="btn" onclick="closeModal()">Abbrechen</button>
    <button class="btn btn-accent" onclick="saveMemory(${subjectId}, '${escStr(content)}', '${type}')">Speichern</button>
  `,
                );
            }

            async function saveMemory(subjectId, oldContent, type) {
                const newContent = document
                    .getElementById("edit-mem-content")
                    .value.trim();
                const endpoint =
                    memMode === "users"
                        ? "/api/users/" + subjectId + "/memories"
                        : "/api/groups/" + subjectId + "/memories";
                try {
                    await api(endpoint, {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            old_content: oldContent,
                            new_content: newContent,
                            subject_type: type,
                        }),
                    });
                    closeModal();
                    toast("Memory gespeichert.");
                    renderMemDetail(subjectId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            async function deleteMemory(subjectId, content, type) {
                if (!confirm("Memory wirklich löschen?")) return;
                const endpoint =
                    memMode === "users"
                        ? "/api/users/" + subjectId + "/memories"
                        : "/api/groups/" + subjectId + "/memories";
                try {
                    await api(endpoint, {
                        method: "DELETE",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ content, subject_type: type }),
                    });
                    toast("Memory gelöscht.");
                    renderMemDetail(subjectId);
                } catch (e) {
                    toast("Fehler.", true);
                }
            }

            async function loadUsage() {
                const el = document.getElementById("usage-detail");
                try {
                    const u = await api("/api/usage");
                    const total = u.total_input + u.total_output;
                    const maxTokens = u.by_caller.reduce(
                        (m, c) => Math.max(m, c.input + c.output),
                        1,
                    );
                    el.innerHTML = `
      <div class="metrics-grid">
        <div class="metric-card"><div class="metric-label">input tokens</div><div class="metric-value">${fmtNum(u.total_input)}</div></div>
        <div class="metric-card"><div class="metric-label">output tokens</div><div class="metric-value">${fmtNum(u.total_output)}</div></div>
        <div class="metric-card"><div class="metric-label">gesamt</div><div class="metric-value">${fmtNum(total)}</div></div>
      </div>
      <div class="detail-block">
        <div class="detail-block-title"><span>Nach Caller</span></div>
        <div class="caller-list">
          ${u.by_caller
              .map((c) => {
                  const t = c.input + c.output;
                  const pct = Math.round((t / maxTokens) * 100);
                  return `<div class="caller-row">
              <div class="caller-name">${c.caller}</div>
              <div class="caller-bar-bg"><div class="caller-bar-fg" style="width:${pct}%"></div></div>
              <div class="caller-tokens">${fmtNum(t)}</div>
            </div>`;
              })
              .join("")}
        </div>
      </div>
    `;
                } catch (e) {
                    el.innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:1rem;">Fehler beim Laden.</div>';
                }
            }

            async function loadTriggers() {
                const el = document.getElementById("triggers-detail");
                try {
                    const triggers = await api("/api/triggers");
                    if (!triggers.length) {
                        el.innerHTML =
                            '<div class="empty-state">Keine Trigger.</div>';
                        return;
                    }
                    el.innerHTML = triggers
                        .map(
                            (t) => `
      <div class="trigger-item">
        <div class="trigger-header">
          <span class="trigger-name">${t.target_agent_name}</span>
          <span class="badge ${t.processed_at ? "badge-done" : "badge-pending"}">${t.processed_at ? "verarbeitet" : "ausstehend"}</span>
        </div>
        <div class="trigger-meta">geplant ${fmt(t.scheduled_for)} · erstellt ${fmt(t.created_at)}</div>
        ${Object.keys(t.payload || {}).length ? `<div class="trigger-meta" style="margin-top:2px;">payload: ${JSON.stringify(t.payload)}</div>` : ""}
      </div>
    `,
                        )
                        .join("");
                } catch (e) {
                    el.innerHTML =
                        '<div style="font-size:13px;color:var(--red);padding:1rem;">Fehler beim Laden.</div>';
                }
            }

            function loadAll() {
                loadAgents();
                loadMemory();
                loadUsage();
                loadTriggers();
            }
            loadAll();
        </script>
    </body>
</html>
