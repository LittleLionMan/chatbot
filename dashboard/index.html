<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>Bob Dashboard</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0e0e0f;
                --bg2: #161618;
                --bg3: #1e1e21;
                --bg4: #26262a;
                --border: rgba(255, 255, 255, 0.07);
                --border2: rgba(255, 255, 255, 0.13);
                --text: #e8e8e6;
                --text2: #888884;
                --text3: #555552;
                --accent: #1d9e75;
                --accent-dim: rgba(29, 158, 117, 0.15);
                --red: #e24b4a;
                --red-dim: rgba(226, 75, 74, 0.12);
                --amber: #ef9f27;
                --amber-dim: rgba(239, 159, 39, 0.12);
                --blue: #378add;
                --blue-dim: rgba(55, 138, 221, 0.12);
                --font: "Syne", sans-serif;
                --mono: "IBM Plex Mono", monospace;
                --radius: 10px;
                --radius-sm: 6px;
                --bottom-nav-height: 60px;
                --safe-bottom: env(safe-area-inset-bottom, 0px);
            }
            body {
                font-family: var(--font);
                background: var(--bg);
                color: var(--text);
                height: 100vh;
                height: 100dvh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 1.5rem;
                height: 52px;
                border-bottom: 0.5px solid var(--border);
                flex-shrink: 0;
            }
            .topbar-left {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .topbar-name {
                font-size: 15px;
                font-weight: 600;
                letter-spacing: -0.01em;
            }
            .topbar-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--accent);
                box-shadow: 0 0 6px var(--accent);
                flex-shrink: 0;
            }
            .topbar-back {
                display: none;
                background: none;
                border: none;
                color: var(--text2);
                cursor: pointer;
                font-size: 20px;
                padding: 4px;
                line-height: 1;
            }
            .topbar-back.visible {
                display: block;
            }
            .desktop-nav {
                display: flex;
                gap: 2px;
            }
            .nav-btn {
                font-family: var(--font);
                font-size: 13px;
                font-weight: 500;
                padding: 6px 14px;
                border-radius: var(--radius-sm);
                border: none;
                background: transparent;
                color: var(--text2);
                cursor: pointer;
                transition:
                    background 0.1s,
                    color 0.1s;
            }
            .nav-btn:hover {
                background: var(--bg3);
                color: var(--text);
            }
            .nav-btn.active {
                background: var(--bg3);
                color: var(--text);
            }

            .layout {
                display: flex;
                flex: 1;
                overflow: hidden;
            }
            .sidebar {
                width: 240px;
                flex-shrink: 0;
                border-right: 0.5px solid var(--border);
                overflow-y: auto;
                padding: 1rem;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .sidebar-search {
                font-family: var(--font);
                font-size: 13px;
                width: 100%;
                padding: 7px 10px;
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
                margin-bottom: 8px;
            }
            .sidebar-search:focus {
                outline: none;
                border-color: var(--border2);
            }
            .sidebar-item {
                padding: 9px 10px;
                border-radius: var(--radius-sm);
                cursor: pointer;
                border: 0.5px solid transparent;
                transition: background 0.1s;
            }
            .sidebar-item:hover {
                background: var(--bg3);
            }
            .sidebar-item.active {
                background: var(--bg3);
                border-color: var(--border);
            }
            .si-name {
                font-size: 13px;
                font-weight: 500;
                color: var(--text);
                display: flex;
                align-items: center;
                gap: 6px;
                flex-wrap: wrap;
            }
            .si-meta {
                font-size: 11px;
                color: var(--text3);
                margin-top: 2px;
                font-family: var(--mono);
            }

            .detail {
                flex: 1;
                overflow-y: auto;
                padding: 1.5rem;
            }
            .empty-state {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 200px;
                font-size: 13px;
                color: var(--text3);
            }
            .section {
                display: none;
            }
            .section.active {
                display: flex;
                height: 100%;
                overflow: hidden;
            }

            .badge {
                font-size: 10px;
                font-family: var(--mono);
                padding: 2px 7px;
                border-radius: 99px;
                font-weight: 500;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .badge-active {
                background: var(--accent-dim);
                color: var(--accent);
            }
            .badge-inactive {
                background: var(--bg4);
                color: var(--text3);
            }
            .badge-pending {
                background: var(--amber-dim);
                color: var(--amber);
            }
            .badge-done {
                background: var(--bg4);
                color: var(--text3);
            }
            .badge-user {
                background: var(--blue-dim);
                color: var(--blue);
            }
            .badge-reflection {
                background: var(--amber-dim);
                color: var(--amber);
            }
            .badge-group {
                background: var(--bg4);
                color: var(--text3);
            }
            .badge-bot {
                background: var(--accent-dim);
                color: var(--accent);
            }
            .badge-pipeline {
                background: var(--blue-dim);
                color: var(--blue);
            }
            .badge-cap {
                background: var(--bg4);
                color: var(--text2);
            }

            .detail-block {
                margin-bottom: 1.5rem;
            }
            .detail-block-title {
                font-size: 10px;
                font-family: var(--mono);
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .detail-text {
                font-size: 13px;
                color: var(--text);
                line-height: 1.6;
            }
            .detail-mono {
                font-family: var(--mono);
                font-size: 12px;
                color: var(--text2);
                margin-bottom: 2px;
                word-break: break-all;
                white-space: pre-wrap;
            }
            .action-bar {
                display: flex;
                gap: 8px;
                margin-bottom: 1.25rem;
                flex-wrap: wrap;
            }

            .btn {
                font-family: var(--font);
                font-size: 12px;
                font-weight: 500;
                padding: 5px 12px;
                border-radius: var(--radius-sm);
                border: 0.5px solid var(--border2);
                background: transparent;
                color: var(--text2);
                cursor: pointer;
                transition:
                    background 0.1s,
                    color 0.1s;
                white-space: nowrap;
            }
            .btn:hover {
                background: var(--bg3);
                color: var(--text);
            }
            .btn:disabled {
                opacity: 0.3;
                cursor: default;
            }
            .btn-danger {
                border-color: var(--red);
                color: var(--red);
            }
            .btn-danger:hover {
                background: var(--red-dim);
            }
            .btn-accent {
                border-color: var(--accent);
                color: var(--accent);
            }
            .btn-accent:hover {
                background: var(--accent-dim);
            }
            .btn-sm {
                font-size: 11px;
                padding: 3px 8px;
            }

            .capability-select {
                font-family: var(--mono);
                font-size: 11px;
                padding: 3px 8px;
                background: var(--bg3);
                border: 0.5px solid var(--border2);
                border-radius: var(--radius-sm);
                color: var(--accent);
                cursor: pointer;
            }
            .capability-select:focus {
                outline: none;
            }

            .pipeline-step {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 10px 12px;
                margin-bottom: 8px;
                min-width: 0;
            }
            .pipeline-step-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 6px;
                margin-bottom: 6px;
                flex-wrap: wrap;
                row-gap: 6px;
            }
            .pipeline-step-id {
                font-family: var(--mono);
                font-size: 11px;
                color: var(--text);
                font-weight: 500;
                min-width: 0;
                word-break: break-all;
            }
            .pipeline-step-info {
                display: flex;
                align-items: center;
                gap: 6px;
                flex-wrap: wrap;
                min-width: 0;
                flex: 1;
            }
            .pipeline-step-actions {
                display: flex;
                gap: 4px;
                flex-shrink: 0;
            }
            .pipeline-step-prompt {
                font-size: 12px;
                color: var(--text2);
                line-height: 1.5;
                margin-bottom: 4px;
                word-break: break-word;
            }
            .pipeline-step-meta {
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text3);
                word-break: break-word;
                white-space: normal;
            }

            .agent-tabs {
                display: flex;
                gap: 2px;
                border-bottom: 0.5px solid var(--border);
                margin-bottom: 1.25rem;
            }
            .agent-tab {
                font-family: var(--font);
                font-size: 12px;
                font-weight: 500;
                padding: 6px 14px;
                border: none;
                background: transparent;
                color: var(--text3);
                cursor: pointer;
                border-bottom: 2px solid transparent;
                margin-bottom: -0.5px;
                transition: color 0.1s;
            }
            .agent-tab:hover {
                color: var(--text2);
            }
            .agent-tab.active {
                color: var(--text);
                border-bottom-color: var(--accent);
            }
            .agent-tab-count {
                font-size: 10px;
                font-family: var(--mono);
                background: var(--bg4);
                border-radius: 99px;
                padding: 1px 5px;
                margin-left: 4px;
            }
            .tab-panel {
                display: none;
            }
            .tab-panel.active {
                display: block;
            }

            .state-grid {
                display: grid;
                gap: 6px;
            }
            .state-card {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 10px 12px;
                min-width: 0;
            }
            .state-card-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 4px;
                gap: 8px;
                flex-wrap: wrap;
            }
            .state-key {
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text3);
                word-break: break-all;
            }
            .state-val {
                font-size: 12px;
                color: var(--text2);
                line-height: 1.5;
                word-break: break-word;
                white-space: pre-wrap;
            }
            .state-actions {
                display: flex;
                gap: 4px;
                opacity: 0;
                transition: opacity 0.1s;
                flex-shrink: 0;
            }
            .state-card:hover .state-actions {
                opacity: 1;
            }

            .ns-block {
                margin-bottom: 1.25rem;
            }
            .ns-label {
                font-size: 10px;
                font-family: var(--mono);
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                margin-bottom: 6px;
                padding-bottom: 4px;
                border-bottom: 0.5px solid var(--border);
            }
            .data-card {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 10px 12px;
                margin-bottom: 6px;
                min-width: 0;
            }
            .data-card-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 4px;
                gap: 8px;
                flex-wrap: wrap;
            }
            .data-key {
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text3);
                word-break: break-all;
                min-width: 0;
            }
            .data-val {
                font-size: 12px;
                color: var(--text2);
                line-height: 1.5;
                word-break: break-word;
                white-space: pre-wrap;
                max-height: 140px;
                overflow-y: auto;
            }
            .data-actions {
                display: flex;
                gap: 4px;
                opacity: 0;
                transition: opacity 0.1s;
                flex-shrink: 0;
            }
            .data-card:hover .data-actions {
                opacity: 1;
            }

            .mem-list {
                display: flex;
                flex-direction: column;
            }
            .mem-row {
                display: flex;
                align-items: flex-start;
                gap: 10px;
                padding: 8px 0;
                border-bottom: 0.5px solid var(--border);
            }
            .mem-row:last-child {
                border-bottom: none;
            }
            .mem-text {
                font-size: 13px;
                color: var(--text);
                line-height: 1.5;
                flex: 1;
                min-width: 0;
                word-break: break-word;
            }
            .mem-date {
                font-size: 10px;
                font-family: var(--mono);
                color: var(--text3);
                flex-shrink: 0;
                padding-top: 2px;
            }
            .mem-actions {
                display: flex;
                gap: 4px;
                opacity: 0;
                transition: opacity 0.1s;
                flex-shrink: 0;
            }
            .mem-row:hover .mem-actions {
                opacity: 1;
            }

            .metrics-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin-bottom: 1.5rem;
            }
            .metric-card {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius);
                padding: 1rem 1.25rem;
            }
            .metric-label {
                font-size: 11px;
                color: var(--text3);
                font-family: var(--mono);
                margin-bottom: 6px;
            }
            .metric-value {
                font-size: 24px;
                font-weight: 600;
                color: var(--text);
                letter-spacing: -0.02em;
            }
            .caller-list {
                display: flex;
                flex-direction: column;
            }
            .caller-row {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 7px 0;
                border-bottom: 0.5px solid var(--border);
            }
            .caller-row:last-child {
                border-bottom: none;
            }
            .caller-name {
                font-family: var(--mono);
                font-size: 11px;
                color: var(--text2);
                width: 180px;
                flex-shrink: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .caller-bar-bg {
                flex: 1;
                background: var(--bg3);
                border-radius: 2px;
                height: 3px;
            }
            .caller-bar-fg {
                height: 3px;
                border-radius: 2px;
                background: var(--accent);
            }
            .caller-tokens {
                font-family: var(--mono);
                font-size: 11px;
                color: var(--text3);
                width: 80px;
                text-align: right;
            }

            .trigger-item {
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 10px 14px;
                margin-bottom: 8px;
            }
            .trigger-header {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 4px;
            }
            .trigger-name {
                font-size: 13px;
                font-weight: 500;
            }
            .trigger-meta {
                font-size: 11px;
                font-family: var(--mono);
                color: var(--text3);
            }

            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                z-index: 100;
                align-items: flex-end;
                justify-content: center;
            }
            .modal-overlay.open {
                display: flex;
            }
            .modal {
                background: var(--bg2);
                border: 0.5px solid var(--border2);
                border-radius: var(--radius) var(--radius) 0 0;
                padding: 1.5rem;
                width: 100%;
                max-height: 85vh;
                overflow-y: auto;
            }
            .modal-title {
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 1rem;
            }
            .modal-field {
                margin-bottom: 12px;
            }
            .modal-label {
                font-size: 11px;
                font-family: var(--mono);
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 0.06em;
                margin-bottom: 4px;
            }
            .modal-input {
                font-family: var(--font);
                font-size: 13px;
                width: 100%;
                padding: 10px;
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
            }
            .modal-input:focus {
                outline: none;
                border-color: var(--border2);
            }
            textarea.modal-input {
                resize: vertical;
                min-height: 80px;
                font-family: var(--mono);
                font-size: 12px;
                line-height: 1.5;
            }
            .modal-select {
                font-family: var(--font);
                font-size: 13px;
                width: 100%;
                padding: 10px;
                background: var(--bg3);
                border: 0.5px solid var(--border);
                border-radius: var(--radius-sm);
                color: var(--text);
            }
            .modal-actions {
                display: flex;
                gap: 8px;
                justify-content: flex-end;
                margin-top: 1rem;
            }

            .toast {
                position: fixed;
                bottom: calc(
                    var(--bottom-nav-height) + var(--safe-bottom) + 1rem
                );
                right: 1rem;
                left: 1rem;
                background: var(--bg3);
                border: 0.5px solid var(--border2);
                border-radius: var(--radius-sm);
                padding: 10px 16px;
                font-size: 13px;
                color: var(--text);
                z-index: 200;
                opacity: 0;
                transform: translateY(8px);
                transition:
                    opacity 0.2s,
                    transform 0.2s;
                pointer-events: none;
                text-align: center;
            }
            .toast.show {
                opacity: 1;
                transform: translateY(0);
            }
            .toast.error {
                border-color: var(--red);
                color: var(--red);
            }

            .bottom-nav {
                display: none;
            }
            .sub-tabs {
                display: flex;
                gap: 6px;
                margin-bottom: 12px;
            }
            .divider {
                border: none;
                border-top: 0.5px solid var(--border);
                margin: 1.25rem 0;
            }

            @media (min-width: 769px) {
                .modal-overlay {
                    align-items: center;
                }
                .modal {
                    border-radius: var(--radius);
                    width: 520px;
                }
                .toast {
                    left: auto;
                    right: 1.5rem;
                    bottom: 1.5rem;
                    text-align: left;
                }
                .state-actions,
                .data-actions,
                .mem-actions {
                    opacity: 0;
                }
            }
            @media (max-width: 768px) {
                .desktop-nav {
                    display: none;
                }
                .topbar {
                    padding: 0 1rem;
                }
                .layout {
                    flex-direction: column;
                    position: relative;
                }
                .section {
                    flex-direction: column;
                }
                .section.active {
                    display: flex;
                }
                .sidebar {
                    width: 100%;
                    border-right: none;
                    border-bottom: none;
                    overflow-y: auto;
                    flex: 1;
                    transition:
                        transform 0.25s ease,
                        opacity 0.25s ease;
                }
                .sidebar.hidden {
                    display: none;
                }
                .detail {
                    position: absolute;
                    inset: 0;
                    background: var(--bg);
                    transform: translateX(100%);
                    transition: transform 0.25s ease;
                    padding: 1rem;
                    overflow-y: auto;
                    pointer-events: none;
                }
                .detail.visible {
                    transform: translateX(0);
                    pointer-events: all;
                }
                .section.active .sidebar {
                    display: flex;
                }
                .bottom-nav {
                    display: flex;
                    background: var(--bg2);
                    border-top: 0.5px solid var(--border);
                    height: calc(var(--bottom-nav-height) + var(--safe-bottom));
                    padding-bottom: var(--safe-bottom);
                    flex-shrink: 0;
                    z-index: 50;
                }
                .bottom-nav-item {
                    flex: 1;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    gap: 3px;
                    background: none;
                    border: none;
                    color: var(--text3);
                    cursor: pointer;
                    padding: 8px 4px;
                    transition: color 0.1s;
                    font-family: var(--font);
                }
                .bottom-nav-item.active {
                    color: var(--accent);
                }
                .bottom-nav-item svg {
                    width: 22px;
                    height: 22px;
                    stroke: currentColor;
                    fill: none;
                    stroke-width: 1.5;
                    stroke-linecap: round;
                    stroke-linejoin: round;
                }
                .bottom-nav-label {
                    font-size: 10px;
                    font-weight: 500;
                }
                .sidebar-item {
                    padding: 12px 10px;
                }
                .si-name {
                    font-size: 14px;
                }
                .state-actions,
                .data-actions,
                .mem-actions {
                    opacity: 1;
                }
                .metrics-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
                .caller-name {
                    width: 120px;
                }
                .agent-tab {
                    font-size: 11px;
                    padding: 6px 10px;
                }
            }
        </style>
    </head>
    <body>
        <div class="topbar">
            <div class="topbar-left">
                <button class="topbar-back" id="topbar-back" onclick="goBack()">
                    ←
                </button>
                <div class="topbar-dot" id="topbar-dot"></div>
                <div class="topbar-name" id="topbar-name">Bob Dashboard</div>
            </div>
